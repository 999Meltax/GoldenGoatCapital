<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivitätsprotokoll – Golden Goat Capital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="/assets/goldengoat.png">
</head>
<body>
    <%- include('navheader.html') %>

    <div class="page-header">
        <div>
            <h1>Aktivitätsprotokoll</h1>
            <p>Alle Änderungen und Aktionen in deinem Account</p>
        </div>
    </div>

    <style>
        .activity-filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .activity-filter-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text-3);
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            transition: all .15s;
        }
        .activity-filter-btn.active {
            background: rgba(99,88,230,.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }
        .activity-timeline {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .activity-day-group {
            margin-bottom: 24px;
        }
        .activity-day-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0 0 10px 52px;
        }
        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 10px 0;
            position: relative;
        }
        .activity-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 17px;
            top: 42px;
            bottom: -10px;
            width: 2px;
            background: var(--border);
        }
        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            flex-shrink: 0;
        }
        .activity-icon.erstellt  { background: rgba(34,197,94,.15);  color: #22c55e; }
        .activity-icon.geaendert { background: rgba(99,88,230,.15);  color: var(--accent); }
        .activity-icon.geloescht { background: rgba(239,68,68,.15);  color: #ef4444; }
        .activity-body {
            flex: 1;
            min-width: 0;
        }
        .activity-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-1);
            line-height: 1.4;
        }
        .activity-meta {
            font-size: 0.76rem;
            color: var(--text-3);
            margin-top: 2px;
        }
        .activity-detail-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.75rem;
            color: var(--text-2);
            margin-top: 4px;
        }
        .activity-empty {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-3);
        }
        .activity-load-more {
            text-align: center;
            padding: 16px;
        }
    </style>

    <div class="activity-filter-bar" id="activityFilterBar">
        <button class="activity-filter-btn active" data-entity="" onclick="setFilter('', this)">
            <i class="ri-list-unordered"></i> Alle
        </button>
        <button class="activity-filter-btn" data-entity="Transaktion" onclick="setFilter('Transaktion', this)">
            <i class="ri-exchange-dollar-line"></i> Transaktionen
        </button>
        <button class="activity-filter-btn" data-entity="Konto" onclick="setFilter('Konto', this)">
            <i class="ri-bank-line"></i> Konten
        </button>
        <button class="activity-filter-btn" data-entity="Finanzziel" onclick="setFilter('Finanzziel', this)">
            <i class="ri-flag-line"></i> Finanzziele
        </button>
        <button class="activity-filter-btn" data-entity="Budget" onclick="setFilter('Budget', this)">
            <i class="ri-bar-chart-box-line"></i> Budgets
        </button>
        <button class="activity-filter-btn" data-entity="Schuld" onclick="setFilter('Schuld', this)">
            <i class="ri-scales-line"></i> Schulden
        </button>
        <button class="activity-filter-btn" data-entity="Fixkosten" onclick="setFilter('Fixkosten', this)">
            <i class="ri-repeat-line"></i> Fixkosten
        </button>
        <button class="activity-filter-btn" data-entity="Haushalt-Transaktion" onclick="setFilter('Haushalt-Transaktion', this)">
            <i class="ri-home-heart-line"></i> Haushalt
        </button>
    </div>

    <div id="activityTimeline" class="activity-timeline">
        <div class="activity-empty">
            <i class="ri-loader-4-line" style="font-size:2rem;display:block;margin-bottom:8px;opacity:0.4;"></i>
            Wird geladen…
        </div>
    </div>

    <div class="activity-load-more" id="activityLoadMore" style="display:none;">
        <button class="btn-secondary" onclick="loadMore()">
            <i class="ri-arrow-down-line"></i> Mehr laden
        </button>
    </div>

    <%- include('footer.html') %>
    <script src="/navheader.js"></script>
    <script src="/activity.js"></script>
</body>
</html>
