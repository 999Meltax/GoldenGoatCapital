<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort vergessen – Golden Goat Capital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="./assets/goldengoat.png">
</head>

<body style="display:block;">

    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="auth-logo">
                <img src="/assets/goldengoat.png" alt="Golden Goat Capital">
                <h2>Passwort zurücksetzen</h2>
                <p>Gib deine E-Mail-Adresse ein – wir senden dir einen Reset-Link</p>
            </div>

            <!-- Step 1: E-Mail eingeben -->
            <div id="stepRequest">
                <div id="requestError" class="auth-error" style="display:none; margin-bottom:16px;"></div>
                <div id="requestSuccess" class="auth-success" style="display:none; margin-bottom:16px;"></div>

                <div class="auth-form">
                    <div class="form-group">
                        <label class="form-label">E-Mail-Adresse</label>
                        <input type="email" id="resetEmail" placeholder="deine@email.de" required>
                    </div>
                    <button type="button" onclick="requestReset()" id="requestBtn" class="btn-primary" style="width:100%; justify-content:center; padding:12px;">
                        <i class="ri-mail-send-line"></i> Reset-Link senden
                    </button>
                </div>
            </div>

            <div class="auth-footer" style="margin-top:20px;">
                <a href="/users/login" style="color:var(--accent); text-decoration:none; font-size:0.85rem;">
                    <i class="ri-arrow-left-line"></i> Zurück zum Login
                </a>
            </div>

        </div>
    </div>

    <style>
    .auth-success {
        background: rgba(34,197,94,0.1);
        border: 1px solid rgba(34,197,94,0.25);
        border-radius: var(--radius-md);
        padding: 12px 16px;
        color: #22c55e;
        font-size: 0.85rem;
    }
    </style>

    <script>
    async function requestReset() {
        const email = document.getElementById('resetEmail').value.trim();
        const btn   = document.getElementById('requestBtn');
        const errEl = document.getElementById('requestError');
        const okEl  = document.getElementById('requestSuccess');

        errEl.style.display = 'none';
        okEl.style.display  = 'none';

        if (!email) {
            errEl.textContent = 'Bitte E-Mail-Adresse eingeben.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="ri-loader-4-line" style="animation:spin 1s linear infinite;display:inline-block;"></i> Wird gesendet…';

        try {
            const res = await fetch('/users/passwort-vergessen/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (res.ok && data.ok) {
                okEl.textContent = 'Falls ein Konto mit dieser E-Mail existiert, hast du in Kürze eine E-Mail mit dem Reset-Link erhalten.';
                okEl.style.display = 'block';
                document.getElementById('resetEmail').disabled = true;
                btn.style.display = 'none';
            } else {
                errEl.textContent = data.message || 'Ein Fehler ist aufgetreten. Versuche es erneut.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="ri-mail-send-line"></i> Reset-Link senden';
            }
        } catch {
            errEl.textContent = 'Netzwerkfehler. Bitte versuche es später erneut.';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="ri-mail-send-line"></i> Reset-Link senden';
        }
    }

    document.getElementById('resetEmail').addEventListener('keydown', e => {
        if (e.key === 'Enter') requestReset();
    });
    </script>

    <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    </style>

</body>
</html>
