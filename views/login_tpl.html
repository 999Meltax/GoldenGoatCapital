<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Golden Goat Capital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="./assets/goldengoat.png">
</head>

<body style="display:block;">

    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="auth-logo">
                <img src="/assets/goldengoat.png" alt="Golden Goat Capital">
                <h2>Willkommen zurück</h2>
                <p>Logge dich ein, um auf dein Konto zuzugreifen</p>
            </div>

            <form method="POST" action="/users/check_login" class="auth-form">
                <div class="form-group">
                    <label class="form-label">E-Mail</label>
                    <input type="email" name="user" id="inputName" placeholder="deine@email.de" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Passwort</label>
                    <input type="password" name="pw" id="inputPasswort" placeholder="••••••••" required>
                </div>

                <% if (error) { %>
                    <div class="auth-error">
                        <p style="margin:0; font-size:0.85rem;"><%= error %></p>
                    </div>
                <% } %>

                <div style="text-align:right; margin-bottom:16px; margin-top:-4px;">
                    <a href="/users/passwort-vergessen" style="font-size:0.82rem; color:var(--accent); text-decoration:none;">Passwort vergessen?</a>
                </div>

                <button type="submit">Einloggen</button>
            </form>

            <div class="auth-footer">
                Noch kein Konto?
                <a href="/users/register">Jetzt registrieren</a>
            </div>

        </div>
    </div>

    <script src="/common.js"></script>
</body>

</html>
