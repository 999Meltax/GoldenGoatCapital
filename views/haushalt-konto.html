<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haushaltskonten – Golden Goat Capital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="/assets/goldengoat.png">
</head>
<body>
    <%- include('navheader.html') %>

    <div id="hkRoot">
        <div style="text-align:center;padding:80px 24px;color:var(--text-3);">
            <i class="ri-loader-4-line" style="font-size:2rem;display:block;margin-bottom:12px;animation:spin 1s linear infinite;"></i>
            Lade Haushaltskonten…
        </div>
    </div>

    <%- include('footer.html') %>

    <style>
    @keyframes spin { to { transform: rotate(360deg); } }

    .hk-setup { max-width: 560px; margin: 0 auto; }
    .hk-setup-hero {
        text-align: center; padding: 40px 24px 32px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-lg); margin-bottom: 20px;
    }
    .hk-setup-icon {
        width: 72px; height: 72px; border-radius: 20px;
        background: rgba(16,185,129,0.12); color: var(--haus-accent);
        display: flex; align-items: center; justify-content: center;
        font-size: 2rem; margin: 0 auto 20px;
    }
    .hk-import-card {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px;
    }
    .hk-import-card h4 { margin: 0 0 6px; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
    .hk-import-card p  { font-size: 0.82rem; color: var(--text-3); margin: 0 0 16px; }

    /* Konten-Grid */
    .hk-konten-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
    }
    .hk-konto-card {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-lg); padding: 22px;
        display: flex; flex-direction: column; gap: 14px;
        transition: var(--transition);
    }
    .hk-konto-card:hover { border-color: var(--border-accent); }
    .hk-konto-card-header { display: flex; align-items: center; gap: 14px; }
    .hk-konto-card-icon {
        width: 46px; height: 46px; border-radius: 13px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.3rem; flex-shrink: 0;
    }
    .hk-konto-card-name { font-weight: 700; font-size: 1rem; color: var(--text-1); }
    .hk-konto-card-type { font-size: 0.74rem; color: var(--text-3); margin-top: 2px; }
    .hk-konto-card-actions { margin-left: auto; display: flex; gap: 6px; flex-shrink: 0; }
    .hk-konto-icon-btn {
        width: 30px; height: 30px; border-radius: 8px;
        background: var(--surface-2); border: 1px solid var(--border);
        color: var(--text-3); display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 0.9rem; transition: var(--transition);
    }
    .hk-konto-icon-btn:hover { color: var(--text-1); border-color: var(--border-accent); }
    .hk-konto-card-balance {
        font-size: 2rem; font-weight: 900; line-height: 1; letter-spacing: -0.02em;
    }
    .hk-konto-card-meta { font-size: 0.73rem; color: var(--text-3); margin-top: 4px; }

    /* Konto hinzufügen Karte */
    .hk-add-card {
        background: var(--surface); border: 2px dashed var(--border);
        border-radius: var(--radius-lg); padding: 22px;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 10px; cursor: pointer;
        transition: var(--transition); min-height: 160px; color: var(--text-3);
    }
    .hk-add-card:hover { border-color: var(--haus-accent); color: var(--haus-accent); background: rgba(16,185,129,0.04); }
    .hk-add-card i { font-size: 1.8rem; }
    .hk-add-card span { font-size: 0.85rem; font-weight: 600; }

    /* Transaktionsliste */
    .hk-tx-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .hk-tx-row:last-child { border-bottom: none; }
    .hk-tx-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.88rem; flex-shrink: 0; }
    .hk-tx-body { flex: 1; min-width: 0; }
    .hk-tx-name { font-weight: 600; font-size: 0.87rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hk-tx-meta { font-size: 0.72rem; color: var(--text-3); margin-top: 2px; display: flex; gap: 6px; flex-wrap: wrap; }

    @media (max-width: 600px) { .hk-konten-grid { grid-template-columns: 1fr; } }
    </style>

    <script>
    const fmt     = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' });
    const fmtSign = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', signDisplay: 'always' });

    let kontenData   = [];
    let haushaltInfo = null;

    async function init() {
        try {
            haushaltInfo = await fetch('/users/haushalt/status').then(r => r.json());
            if (!haushaltInfo?.haushalt) return renderNoHaushalt();
            await loadKonten();
        } catch(e) {
            document.getElementById('hkRoot').innerHTML =
                '<div style="text-align:center;padding:60px;color:#ef4444;"><i class="ri-error-warning-line" style="font-size:2rem;display:block;margin-bottom:12px;"></i>Fehler beim Laden.</div>';
        }
    }

    async function loadKonten() {
        const res  = await fetch('/users/haushalt/konto/data').then(r => r.json()).catch(() => null);
        kontenData = res?.konten || [];
        if (kontenData.length === 0) return renderSetup();
        renderHauptseite();
    }

    function renderNoHaushalt() {
        document.getElementById('hkRoot').innerHTML =
            '<div style="max-width:520px;margin:0 auto;text-align:center;padding:60px 24px;">' +
                '<i class="ri-home-heart-line" style="font-size:3rem;color:var(--haus-accent);display:block;margin-bottom:16px;opacity:0.6;"></i>' +
                '<h2>Kein Haushalt vorhanden</h2>' +
                '<p style="color:var(--text-3);">Erstelle oder tritt einem Haushalt bei.</p>' +
                '<a href="/users/haushalt/einstellungen" class="btn-primary" style="margin-top:20px;display:inline-flex;background:var(--haus-accent);">Haushalt einrichten</a>' +
            '</div>';
    }

    function renderSetup() {
        const root = document.getElementById('hkRoot');
        root.innerHTML =
            '<div class="page-header"><div><h1><i class="ri-bank-card-line" style="color:var(--haus-accent);margin-right:8px;"></i>Haushaltskonten einrichten</h1>' +
            '<p>Ihr könnt mehrere Konten pro Haushalt führen — z.B. Haushaltskasse, gemeinsames Konto, Kreditkarte.</p></div></div>' +
            '<div class="hk-setup">' +
                '<div class="hk-setup-hero">' +
                    '<div class="hk-setup-icon"><i class="ri-bank-card-line"></i></div>' +
                    '<h2 style="margin:0 0 8px;">Erstes Konto anlegen</h2>' +
                    '<p style="color:var(--text-3);margin:0;">Legt gemeinsam Konten an und behaltet den Überblick.</p>' +
                '</div>' +
                '<div class="hk-import-card">' +
                    '<h4><i class="ri-add-circle-line" style="color:var(--haus-accent);"></i> Neues Konto erstellen</h4>' +
                    '<p>Legt ein neues Haushaltskonto an.</p>' +
                    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">' +
                        '<div class="form-group" style="margin:0;"><label class="form-label">Kontoname</label><input type="text" id="newKontoName" placeholder="z.B. Haushaltskasse"></div>' +
                        '<div class="form-group" style="margin:0;"><label class="form-label">Startguthaben (€)</label><input type="number" id="newKontoBalance" placeholder="0,00" step="0.01"></div>' +
                    '</div>' +
                    '<div class="form-group" style="margin:0 0 12px;"><label class="form-label">Farbe</label><input type="color" id="newKontoColor" value="#10b981" style="height:42px;padding:4px 8px;width:100%;"></div>' +
                    '<button class="btn-primary" style="background:var(--haus-accent);" onclick="createKonto()"><i class="ri-add-line"></i> Konto erstellen</button>' +
                    '<div id="createMsg" style="margin-top:10px;font-size:0.83rem;"></div>' +
                '</div>' +
                '<div class="hk-import-card">' +
                    '<h4><i class="ri-link" style="color:var(--accent);"></i> Privates Konto verknüpfen</h4>' +
                    '<p>Verknüpfe ein bestehendes privates Konto mit dem Haushalt.</p>' +
                    '<div class="form-group" style="margin:0 0 12px;"><label class="form-label">Konto auswählen</label><select id="linkKontoSelect"><option value="">Lade Konten…</option></select></div>' +
                    '<button class="btn-primary" onclick="linkKonto()"><i class="ri-link"></i> Verknüpfen</button>' +
                    '<div id="linkMsg" style="margin-top:10px;font-size:0.83rem;"></div>' +
                '</div>' +
            '</div>';

        fetch('/users/haushalt/konto/meine-privaten').then(r => r.json()).then(konten => {
            const sel = document.getElementById('linkKontoSelect');
            if (!konten?.length) { sel.innerHTML = '<option>Keine privaten Konten gefunden</option>'; return; }
            sel.innerHTML = '<option value="">Konto wählen…</option>' +
                konten.map(k => '<option value="' + k.id + '">' + escHtml(k.name) + ' (' + fmt.format(k.balance || 0) + ')</option>').join('');
        }).catch(() => {});
    }

    async function createKonto() {
        const name    = document.getElementById('newKontoName')?.value.trim();
        const balance = parseFloat(document.getElementById('newKontoBalance')?.value) || 0;
        const color   = document.getElementById('newKontoColor')?.value || '#10b981';
        const msg     = document.getElementById('createMsg');
        if (!name) { if(msg){msg.style.color='#ef4444';msg.textContent='Bitte einen Namen eingeben.';} return; }
        const res  = await fetch('/users/haushalt/konto/create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name, balance, color }) });
        const data = await res.json();
        if (!res.ok) { if(msg){msg.style.color='#ef4444';msg.textContent=data.message;} return; }
        await loadKonten();
    }

    async function linkKonto() {
        const id  = document.getElementById('linkKontoSelect')?.value;
        const msg = document.getElementById('linkMsg');
        if (!id) { if(msg){msg.style.color='#ef4444';msg.textContent='Bitte ein Konto auswählen.';} return; }
        const res  = await fetch('/users/haushalt/konto/import', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ account_id: id }) });
        const data = await res.json();
        if (!res.ok) { if(msg){msg.style.color='#ef4444';msg.textContent=data.message;} return; }
        await loadKonten();
    }

    // ── Hauptseite ─────────────────────────────────────────────
    function renderHauptseite() {
        const root = document.getElementById('hkRoot');
        const gesamtBalance = kontenData.reduce((s, k) => s + (k.currentBalance ?? k.balance ?? 0), 0);
        const gesamtColor   = gesamtBalance >= 0 ? '#22c55e' : '#ef4444';

        root.innerHTML =
            '<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;">' +
                '<div>' +
                    '<h1><i class="ri-bank-card-line" style="color:var(--haus-accent);margin-right:8px;"></i>Haushaltskonten</h1>' +
                    '<p>' + escHtml(haushaltInfo.haushalt.name) + ' · ' + kontenData.length + ' Konto' + (kontenData.length !== 1 ? 'en' : '') +
                    ' · Gesamt: <b style="color:' + gesamtColor + ';">' + fmt.format(gesamtBalance) + '</b></p>' +
                '</div>' +
                '<a href="/users/haushalt/tracker" class="btn-primary" style="background:var(--haus-accent);text-decoration:none;"><i class="ri-exchange-2-line"></i> Transaktionen</a>' +
            '</div>' +
            '<div class="hk-konten-grid" id="hkKontenGrid"></div>' +
            '<div class="card" style="margin-bottom:20px;">' +
                '<div class="card-header">' +
                    '<h3><i class="ri-exchange-2-line" style="color:var(--haus-accent);margin-right:6px;"></i>Letzte Transaktionen</h3>' +
                    '<a href="/users/haushalt/tracker" style="font-size:0.8rem;color:var(--haus-accent);text-decoration:none;font-weight:600;">Alle anzeigen <i class="ri-arrow-right-line"></i></a>' +
                '</div>' +
                '<div id="hkRecentTxs"><div style="text-align:center;padding:20px;color:var(--text-3);"><i class="ri-loader-4-line" style="animation:spin 1s linear infinite;display:inline-block;"></i></div></div>' +
            '</div>';

        renderKontenGrid();
        loadRecentTxs();
    }

    function renderKontenGrid() {
        const grid = document.getElementById('hkKontenGrid');
        if (!grid) return;

        const cards = kontenData.map(k => {
            const bal       = k.currentBalance ?? k.balance ?? 0;
            const balColor  = bal >= 0 ? '#22c55e' : '#ef4444';
            const iconColor = k.color || '#10b981';
            return '<div class="hk-konto-card">' +
                '<div class="hk-konto-card-header">' +
                    '<div class="hk-konto-card-icon" style="background:' + iconColor + '20;color:' + iconColor + ';"><i class="ri-bank-card-line"></i></div>' +
                    '<div style="flex:1;min-width:0;">' +
                        '<div class="hk-konto-card-name">' + escHtml(k.name) + '</div>' +
                        '<div class="hk-konto-card-type">' + (k.linked_account_id ? '<i class="ri-link" style="color:var(--haus-accent);"></i> Verknüpft' : 'Haushaltskonto') + '</div>' +
                    '</div>' +
                    '<div class="hk-konto-card-actions">' +
                        '<button class="hk-konto-icon-btn" onclick="openBalanceModal(' + k.id + ')" title="Kontostand anpassen" style="color:var(--haus-accent);border-color:rgba(16,185,129,0.25);"><i class="ri-edit-2-line"></i></button>' +
                        '<button class="hk-konto-icon-btn" onclick="openEditModal(' + k.id + ')" title="Einstellungen"><i class="ri-settings-3-line"></i></button>' +
                        (kontenData.length > 1 ? '<button class="hk-konto-icon-btn" onclick="deleteKonto(' + k.id + ',\'' + escHtml(k.name).replace(/'/g, "\\'") + '\')" title="Löschen" style="color:#ef4444;border-color:rgba(239,68,68,0.2);"><i class="ri-delete-bin-line"></i></button>' : '') +
                    '</div>' +
                '</div>' +
                '<div>' +
                    '<div class="hk-konto-card-balance" style="color:' + balColor + ';">' + fmt.format(bal) + '</div>' +
                    '<div class="hk-konto-card-meta">Startguthaben: ' + fmt.format(k.balance) + '</div>' +
                '</div>' +
            '</div>';
        });

        cards.push(
            '<div class="hk-add-card" onclick="openAddKontoModal()">' +
                '<i class="ri-add-circle-line"></i>' +
                '<span>Konto hinzufügen</span>' +
            '</div>'
        );

        grid.innerHTML = cards.join('');
    }

    async function loadRecentTxs() {
        const el = document.getElementById('hkRecentTxs');
        if (!el) return;
        try {
            const txs = await fetch('/users/haushalt/transaktionen').then(r => r.json());
            const recent = (txs || []).slice(0, 8);
            if (!recent.length) {
                el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-3);font-size:0.85rem;"><i class="ri-exchange-2-line" style="font-size:1.5rem;display:block;margin-bottom:8px;opacity:0.3;"></i>Noch keine Transaktionen</div>';
                return;
            }
            el.innerHTML = recent.map(t => {
                const inc       = t.type === 'Einnahmen';
                const kontoName = kontenData.find(k => k.id === t.konto_id)?.name || '';
                return '<div class="hk-tx-row">' +
                    '<div class="hk-tx-icon" style="background:' + (inc ? 'rgba(34,197,94,0.12)' : 'rgba(239,68,68,0.1)') + ';color:' + (inc ? '#22c55e' : '#ef4444') + ';"><i class="' + (inc ? 'ri-arrow-down-line' : 'ri-arrow-up-line') + '"></i></div>' +
                    '<div class="hk-tx-body">' +
                        '<div class="hk-tx-name">' + escHtml(t.name) + '</div>' +
                        '<div class="hk-tx-meta">' +
                            '<span>' + new Date(t.date).toLocaleDateString('de-DE') + '</span>' +
                            '<span>' + escHtml(t.category || '—') + '</span>' +
                            (kontoName ? '<span style="color:var(--haus-accent);">' + escHtml(kontoName) + '</span>' : '') +
                        '</div>' +
                    '</div>' +
                    '<span style="font-weight:800;font-size:0.9rem;white-space:nowrap;color:' + (inc ? '#22c55e' : '#ef4444') + ';">' + fmtSign.format(t.amount * (inc ? 1 : -1)) + '</span>' +
                '</div>';
            }).join('');
        } catch {
            el.innerHTML = '<div style="color:var(--text-3);font-size:0.82rem;padding:16px;">Transaktionen konnten nicht geladen werden.</div>';
        }
    }

    // ── Modals ─────────────────────────────────────────────────
    function openEditModal(kontoId) {
        const k = kontenData.find(k => k.id === kontoId);
        if (!k) return;
        openKontoModal({
            title: 'Konto bearbeiten',
            name: k.name, balance: k.balance, color: k.color || '#10b981',
            onSave: async (name, balance, color) => {
                const res = await fetch('/users/haushalt/konto/' + kontoId, {
                    method: 'PATCH', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ name, balance, color })
                });
                if (!res.ok) throw new Error((await res.json()).message || 'Fehler');
            }
        });
    }

    function openBalanceModal(kontoId) {
        const k = kontenData.find(k => k.id === kontoId);
        if (!k) return;
        const currentBal = k.currentBalance ?? k.balance ?? 0;

        const ex = document.getElementById('hkBalOverlay');
        if (ex) ex.remove();

        const overlay = document.createElement('div');
        overlay.id = 'hkBalOverlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
        overlay.innerHTML =
            '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:400px;">' +
                '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">' +
                    '<h3 style="margin:0;">Kontostand anpassen</h3>' +
                    '<button id="hkBClose" style="width:32px;height:32px;border-radius:8px;background:var(--surface-2);border:none;color:var(--text-2);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;"><i class="ri-close-line"></i></button>' +
                '</div>' +
                '<p style="font-size:0.83rem;color:var(--text-3);margin:0 0 20px;">' + escHtml(k.name) + '</p>' +
                '<div class="form-group" style="margin-bottom:6px;">' +
                    '<label class="form-label">Neuer Kontostand (€)</label>' +
                    '<input type="number" id="hkBNewBal" value="' + currentBal.toFixed(2) + '" step="0.01" style="width:100%;padding:10px 14px;border-radius:var(--radius-md);background:var(--surface-2);border:1px solid var(--border);color:var(--text-1);font-size:1rem;font-family:\'Plus Jakarta Sans\',sans-serif;">' +
                '</div>' +
                '<div id="hkBDiff" style="font-size:0.82rem;color:var(--text-3);margin-bottom:16px;min-height:1.3em;"></div>' +
                '<div id="hkBMsg" style="font-size:0.82rem;margin-bottom:10px;min-height:1.2em;"></div>' +
                '<div style="display:flex;gap:8px;">' +
                    '<button id="hkBSave" class="btn-primary" style="flex:1;justify-content:center;background:var(--haus-accent);"><i class="ri-check-line"></i> Übernehmen</button>' +
                    '<button id="hkBCancel" style="padding:10px 20px;border-radius:var(--radius-md);background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);cursor:pointer;font-family:\'Plus Jakarta Sans\',sans-serif;">Abbrechen</button>' +
                '</div>' +
            '</div>';
        document.body.appendChild(overlay);

        const close = () => overlay.remove();
        document.getElementById('hkBClose').onclick  = close;
        document.getElementById('hkBCancel').onclick = close;
        overlay.onclick = e => { if (e.target === overlay) close(); };

        const input   = document.getElementById('hkBNewBal');
        const diffEl  = document.getElementById('hkBDiff');
        const updateDiff = () => {
            const newVal = parseFloat(input.value);
            if (isNaN(newVal)) { diffEl.textContent = ''; return; }
            const diff = newVal - currentBal;
            if (Math.abs(diff) < 0.005) { diffEl.textContent = 'Keine Änderung.'; diffEl.style.color = 'var(--text-3)'; return; }
            diffEl.textContent = (diff > 0 ? '+' : '') + fmt.format(diff) + ' gegenüber aktuellem Stand';
            diffEl.style.color = diff > 0 ? '#22c55e' : '#ef4444';
        };
        input.addEventListener('input', updateDiff);
        updateDiff();

        document.getElementById('hkBSave').onclick = async () => {
            const newVal = parseFloat(input.value);
            const msg    = document.getElementById('hkBMsg');
            if (isNaN(newVal)) { msg.style.color='#ef4444'; msg.textContent='Bitte einen gültigen Betrag eingeben.'; return; }
            msg.style.color = 'var(--text-3)'; msg.textContent = 'Speichern…';
            try {
                const res = await fetch('/users/haushalt/konto/' + kontoId + '/set-balance', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ balance: newVal })
                });
                if (!res.ok) {
                    const ct = res.headers.get('content-type') || '';
                    const errMsg = ct.includes('json')
                        ? (await res.json()).message
                        : 'Serverfehler (' + res.status + ')';
                    throw new Error(errMsg || 'Fehler');
                }
                close();
                await loadKonten();
            } catch(err) {
                msg.style.color='#ef4444'; msg.textContent = err.message || 'Fehler.';
            }
        };
    }

    function openAddKontoModal() {
        openKontoModal({
            title: 'Neues Konto hinzufügen',
            name: '', balance: 0, color: '#10b981',
            onSave: async (name, balance, color) => {
                const res = await fetch('/users/haushalt/konto/create', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ name, balance, color })
                });
                if (!res.ok) throw new Error((await res.json()).message || 'Fehler');
            }
        });
    }

    function openKontoModal({ title, name, balance, color, onSave }) {
        const ex = document.getElementById('hkModalOverlay');
        if (ex) ex.remove();

        const overlay = document.createElement('div');
        overlay.id = 'hkModalOverlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
        overlay.innerHTML =
            '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:420px;">' +
                '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
                    '<h3 style="margin:0;">' + escHtml(title) + '</h3>' +
                    '<button id="hkMClose" style="width:32px;height:32px;border-radius:8px;background:var(--surface-2);border:none;color:var(--text-2);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;"><i class="ri-close-line"></i></button>' +
                '</div>' +
                '<div style="display:flex;flex-direction:column;gap:14px;">' +
                    '<div class="form-group"><label class="form-label">Kontoname</label><input type="text" id="hkMName" value="' + escHtml(name) + '" placeholder="z.B. Haushaltskasse"></div>' +
                    '<div class="form-group"><label class="form-label">Startguthaben (€)</label><input type="number" id="hkMBalance" value="' + balance + '" step="0.01"></div>' +
                    '<div class="form-group"><label class="form-label">Farbe</label><input type="color" id="hkMColor" value="' + color + '" style="height:42px;padding:4px 8px;width:100%;"></div>' +
                '</div>' +
                '<div id="hkMMsg" style="font-size:0.82rem;margin-top:10px;min-height:1.2em;"></div>' +
                '<div style="display:flex;gap:8px;margin-top:20px;">' +
                    '<button id="hkMSave" class="btn-primary" style="flex:1;justify-content:center;background:var(--haus-accent);"><i class="ri-save-line"></i> Speichern</button>' +
                    '<button id="hkMCancel" style="padding:10px 20px;border-radius:var(--radius-md);background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);cursor:pointer;font-family:\'Plus Jakarta Sans\',sans-serif;">Abbrechen</button>' +
                '</div>' +
            '</div>';
        document.body.appendChild(overlay);

        const close = () => overlay.remove();
        document.getElementById('hkMClose').onclick   = close;
        document.getElementById('hkMCancel').onclick  = close;
        overlay.onclick = e => { if (e.target === overlay) close(); };

        document.getElementById('hkMSave').onclick = async () => {
            const n   = document.getElementById('hkMName').value.trim();
            const b   = parseFloat(document.getElementById('hkMBalance').value) || 0;
            const c   = document.getElementById('hkMColor').value;
            const msg = document.getElementById('hkMMsg');
            if (!n) { msg.style.color='#ef4444'; msg.textContent='Bitte Namen eingeben.'; return; }
            msg.style.color = 'var(--text-3)'; msg.textContent = 'Speichern…';
            try {
                await onSave(n, b, c);
                close();
                await loadKonten();
            } catch(err) {
                msg.style.color='#ef4444'; msg.textContent = err.message || 'Fehler.';
            }
        };
    }

    async function deleteKonto(kontoId, kontoName) {
        if (!confirm('Konto "' + kontoName + '" löschen?\n\nAlle zugehörigen Transaktionen werden ebenfalls unwiderruflich gelöscht.')) return;
        try {
            const res = await fetch('/users/haushalt/konto/' + kontoId, { method: 'DELETE' });
            const data = await res.json();
            if (!res.ok) { alert(data.message || 'Fehler'); return; }
            await loadKonten();
        } catch { alert('Fehler beim Löschen.'); }
    }

    function escHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
    </script>
    <script src="/navheader.js"></script>
</body>
</html>
