<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haushalt – Golden Goat Capital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="/assets/goldengoat.png">
</head>
<body>
    <%- include('navheader.html') %>

    <div id="hausRoot">
        <div style="text-align:center;padding:80px 24px;color:var(--text-3);">
            <i class="ri-loader-4-line" style="font-size:2rem;display:block;margin-bottom:12px;animation:spin 1s linear infinite;"></i>
            Lade Haushalt…
        </div>
    </div>

    <%- include('footer.html') %>

    <style>
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Setup */
    .haus-setup { max-width: 540px; margin: 60px auto; text-align: center; }
    .haus-setup-icon {
        width: 72px; height: 72px; background: rgba(16,185,129,0.12);
        border-radius: 20px; display: flex; align-items: center; justify-content: center;
        font-size: 2rem; color: var(--haus-accent); margin: 0 auto 24px;
    }
    .haus-setup-tabs {
        display: flex; background: var(--surface-2); border-radius: var(--radius-md);
        padding: 4px; margin-bottom: 24px; gap: 4px;
    }
    .haus-setup-tab {
        flex: 1; padding: 8px; border: none; background: transparent;
        color: var(--text-3); border-radius: var(--radius-md); cursor: pointer;
        font-size: 0.85rem; font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 600; transition: var(--transition);
    }
    .haus-setup-tab.active { background: var(--haus-accent); color: #fff; }

    /* Stat-Cards */
    .haus-stats {
        display: grid; grid-template-columns: repeat(5, 1fr);
        gap: 14px; margin-bottom: 18px;
    }
    .haus-stat-card {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-lg); padding: 16px 18px;
        display: flex; align-items: center; gap: 12px;
    }
    .haus-stat-card.clickable { cursor: pointer; }
    .haus-stat-card.clickable:hover { border-color: var(--haus-accent); }
    .haus-stat-icon {
        width: 42px; height: 42px; border-radius: 11px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.15rem; flex-shrink: 0;
    }
    .haus-stat-icon.green  { background: rgba(16,185,129,0.15); color: #10b981; }
    .haus-stat-icon.blue   { background: rgba(59,130,246,0.15);  color: #3b82f6; }
    .haus-stat-icon.amber  { background: rgba(245,158,11,0.15);  color: #f59e0b; }
    .haus-stat-icon.red    { background: rgba(239,68,68,0.12);   color: #ef4444; }
    .haus-stat-icon.purple { background: rgba(139,92,246,0.15);  color: #8b5cf6; }
    .haus-stat-body { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .haus-stat-label { font-size: 0.73rem; color: var(--text-3); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .haus-stat-value { font-size: 1.15rem; font-weight: 800; color: var(--text-1); }
    .haus-stat-sub { font-size: 0.72rem; color: var(--text-3); margin-top: 1px; }

    /* Insights */
    .haus-insights { margin-bottom: 18px; display: flex; flex-direction: column; gap: 8px; }
    .haus-alert {
        display: flex; align-items: flex-start; gap: 12px;
        padding: 12px 16px; border-radius: var(--radius-md);
        font-size: 0.83rem; border: 1px solid;
    }
    .haus-alert.warn  { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.25); color: #b45309; }
    .haus-alert.danger{ background: rgba(239,68,68,0.08);  border-color: rgba(239,68,68,0.25);  color: #b91c1c; }
    .haus-alert.good  { background: rgba(16,185,129,0.07); border-color: rgba(16,185,129,0.2);  color: #047857; }
    .haus-alert.info  { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.25); color: #1d4ed8; }
    .haus-alert i { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .haus-alert a { color: inherit; font-weight: 700; text-decoration: underline; }

    /* Main grid */
    .haus-main-grid {
        display: grid; grid-template-columns: 1fr 340px;
        gap: 18px; margin-bottom: 18px;
    }
    .haus-left { display: flex; flex-direction: column; gap: 18px; }
    .haus-right { display: flex; flex-direction: column; gap: 18px; }

    /* Person-Cards */
    .haus-person-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .haus-person-card {
        border-radius: var(--radius-md); padding: 16px;
    }
    .haus-person-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
        font-size: 0.82rem;
    }
    .haus-person-row:last-child { border-bottom: none; padding-bottom: 0; }
    .haus-person-total {
        display: flex; justify-content: space-between; align-items: center;
        padding-top: 8px; margin-top: 4px; border-top: 2px solid rgba(255,255,255,0.12);
        font-weight: 800; font-size: 0.9rem;
    }

    /* Sparziele */
    .haus-sparziel-item {
        padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .haus-sparziel-item:last-child { border-bottom: none; padding-bottom: 0; }
    .haus-progress {
        width: 100%; height: 6px; background: var(--surface-2);
        border-radius: 4px; overflow: hidden; margin-top: 6px;
    }
    .haus-progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

    /* Tx-Liste */
    .haus-tx-row {
        display: flex; align-items: center; gap: 10px;
        padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 0.83rem;
    }
    .haus-tx-row:last-child { border-bottom: none; }

    /* Split-Zeilen */
    .haus-split-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 0.83rem;
    }
    .haus-split-row:last-child { border-bottom: none; }

    /* Member */
    .haus-member-card {
        display: flex; gap: 10px; align-items: center;
        padding: 10px 12px; background: rgba(16,185,129,0.05);
        border: 1px solid rgba(16,185,129,0.15); border-radius: var(--radius-md);
        margin-bottom: 8px;
    }
    .haus-member-avatar {
        width: 38px; height: 38px; border-radius: 50%;
        background: rgba(16,185,129,0.2);
        display: flex; align-items: center; justify-content: center;
        font-size: 1rem; color: var(--haus-accent); flex-shrink: 0; font-weight: 700;
    }
    .haus-invite-box {
        background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.2);
        border-radius: var(--radius-md); padding: 12px 14px;
        display: flex; align-items: center; gap: 10px; margin-top: 10px;
    }
    .haus-invite-code {
        font-family: monospace; font-size: 1.05rem; font-weight: 700;
        color: var(--haus-accent); letter-spacing: 0.12em; flex: 1;
    }

    @media (max-width: 1200px) {
        .haus-stats { grid-template-columns: repeat(3, 1fr); }
        .haus-main-grid { grid-template-columns: 1fr; }
        .haus-right { flex-direction: row; flex-wrap: wrap; }
        .haus-right > * { flex: 1; min-width: 280px; }
    }
    @media (max-width: 800px) {
        .haus-stats { grid-template-columns: repeat(2, 1fr); }
        .haus-person-grid { grid-template-columns: 1fr; }
        .haus-right { flex-direction: column; }
    }
    </style>

    <script src="/navheader.js"></script>
    <script>
    const fmt = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' });

    function escHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function init() {
        const root = document.getElementById('hausRoot');
        try {
            const res = await fetch('/users/haushalt/status');
            const data = await res.json();
            if (!data.haushalt) {
                renderSetup(root);
            } else {
                renderDashboard(root, data);
            }
        } catch (err) {
            root.innerHTML = '<div class="card" style="text-align:center;padding:60px;color:#ef4444;">Fehler beim Laden.</div>';
        }
    }

    // ── Setup (Onboarding – 3 Schritte) ───────────────────────────
    let _onboardingMode = 'create';

    function renderSetup(root) {
        renderOnboardingStep(root, 1);
    }

    function renderOnboardingStep(root, step, extra) {
        if (step === 1) {
            root.innerHTML =
                '<div class="haus-setup">' +
                    '<div class="haus-setup-icon"><i class="ri-home-heart-line"></i></div>' +
                    '<h2 style="margin:0 0 8px;">Willkommen im Haushalt-Modus</h2>' +
                    '<p style="color:var(--text-3);margin-bottom:24px;line-height:1.6;">Der einzige Finanzmanager, der private Finanzen und gemeinsamen Haushalt in einer App vereint.</p>' +
                    '<div class="card" style="padding:20px;margin-bottom:24px;text-align:left;">' +
                        '<div style="display:flex;flex-direction:column;gap:14px;">' +
                            onbFeatureRow('ri-scales-line', '#10b981', 'Faire Kostenaufteilung', 'Legt fest, wer wie viel (%) zu den Fixkosten beiträgt.') +
                            onbFeatureRow('ri-exchange-funds-line', '#3b82f6', 'Transparente Ausgaben', 'Beide sehen alle Haushalt-Transaktionen in Echtzeit.') +
                            onbFeatureRow('ri-exchange-dollar-line', '#f59e0b', 'Automatische Abrechnung', 'Monatlich: wer schuldet wem wie viel — auf einen Blick.') +
                            onbFeatureRow('ri-checkbox-line', '#8b5cf6', 'Gemeinsame Aufgaben', 'Haushalt-To-Dos mit Priorität, Fälligkeitsdatum und Wiederholung.') +
                        '</div>' +
                    '</div>' +
                    '<button onclick="renderOnboardingStep(document.getElementById(\'hausRoot\'), 2)" class="btn-primary" style="width:100%;justify-content:center;font-size:0.95rem;padding:12px 20px;">' +
                        '<i class="ri-home-heart-line"></i> Haushalt einrichten' +
                    '</button>' +
                    '<div style="margin-top:12px;font-size:0.78rem;color:var(--text-3);">Einladungscode erhalten? <button onclick="_onboardingMode=\'join\';renderOnboardingStep(document.getElementById(\'hausRoot\'), 2, \'join\')" style="background:none;border:none;color:var(--haus-accent);cursor:pointer;font-family:inherit;font-size:inherit;font-weight:700;padding:0;">Direkt beitreten →</button></div>' +
                '</div>';
        } else if (step === 2) {
            const isJoin = extra === 'join';
            root.innerHTML =
                '<div class="haus-setup">' +
                    '<button onclick="renderOnboardingStep(document.getElementById(\'hausRoot\'), 1)" style="display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text-3);cursor:pointer;font-family:inherit;font-size:0.83rem;margin-bottom:20px;padding:0;"><i class="ri-arrow-left-line"></i> Zurück</button>' +
                    '<div class="haus-setup-icon"><i class="ri-home-heart-line"></i></div>' +
                    '<h2 style="margin:0 0 8px;">Haushalt einrichten</h2>' +
                    '<p style="color:var(--text-3);margin-bottom:28px;">Erstellt einen neuen Haushalt oder tretet einem bestehenden bei.</p>' +
                    '<div class="haus-setup-tabs">' +
                        '<button class="haus-setup-tab' + (!isJoin ? ' active' : '') + '" onclick="_onboardingMode=\'create\';renderOnboardingStep(document.getElementById(\'hausRoot\'), 2)">Haushalt erstellen</button>' +
                        '<button class="haus-setup-tab' + (isJoin ? ' active' : '') + '" onclick="_onboardingMode=\'join\';renderOnboardingStep(document.getElementById(\'hausRoot\'), 2, \'join\')">Einladung annehmen</button>' +
                    '</div>' +
                    (!isJoin ?
                        '<div class="card" style="padding:24px;text-align:left;">' +
                            '<div class="form-group" style="margin-bottom:14px;"><label class="form-label">Name des Haushalts</label><input type="text" id="hausName" placeholder="z.B. Unser Zuhause" class="form-control"></div>' +
                            '<div class="form-group" style="margin-bottom:20px;"><label class="form-label">Dein Anzeigename</label><input type="text" id="hausAnzeige" placeholder="z.B. Max" class="form-control"></div>' +
                            '<button onclick="createHaushalt()" class="btn-primary" style="width:100%;justify-content:center;"><i class="ri-home-heart-line"></i> Haushalt erstellen</button>' +
                        '</div>' :
                        '<div class="card" style="padding:24px;text-align:left;">' +
                            '<div class="form-group" style="margin-bottom:14px;"><label class="form-label">Einladungscode</label><input type="text" id="joinCode" placeholder="z.B. AB12CD34" class="form-control" style="text-transform:uppercase;"></div>' +
                            '<div class="form-group" style="margin-bottom:20px;"><label class="form-label">Dein Anzeigename</label><input type="text" id="joinAnzeige" placeholder="z.B. Lara" class="form-control"></div>' +
                            '<button onclick="joinHaushalt()" class="btn-primary" style="width:100%;justify-content:center;"><i class="ri-group-line"></i> Haushalt beitreten</button>' +
                        '</div>') +
                    '<div id="setupMsg" style="margin-top:12px;text-align:center;font-size:0.85rem;"></div>' +
                '</div>';
        } else if (step === 3) {
            root.innerHTML =
                '<div class="haus-setup">' +
                    '<div class="haus-setup-icon" style="background:rgba(16,185,129,0.2);"><i class="ri-check-line" style="color:#10b981;"></i></div>' +
                    '<h2 style="margin:0 0 8px;">Haushalt erstellt! 🎉</h2>' +
                    '<p style="color:var(--text-3);margin-bottom:24px;line-height:1.6;">Ladet jetzt euren Partner ein, damit ihr gemeinsam loslegen könnt.</p>' +
                    '<div class="card" style="padding:24px;margin-bottom:16px;text-align:left;">' +
                        '<h4 style="margin:0 0 12px;font-size:0.82rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;">Partner per E-Mail einladen</h4>' +
                        '<div style="display:flex;gap:8px;">' +
                            '<input type="email" id="onbInviteEmail" placeholder="partner@email.com" style="flex:1;">' +
                            '<button onclick="onbSendInvite()" class="btn-primary" style="flex-shrink:0;"><i class="ri-mail-send-line"></i> Einladen</button>' +
                        '</div>' +
                        '<div id="onbInviteMsg" style="margin-top:8px;font-size:0.82rem;"></div>' +
                    '</div>' +
                    '<button onclick="location.reload()" class="btn-ghost" style="width:100%;justify-content:center;">Zum Dashboard <i class="ri-arrow-right-line"></i></button>' +
                    '<div style="margin-top:8px;text-align:center;font-size:0.78rem;color:var(--text-3);">Einladung kann auch später unter <a href="/users/haushalt/einstellungen" style="color:var(--haus-accent);">Einstellungen</a> versandt werden.</div>' +
                '</div>';
        }
    }

    function onbFeatureRow(icon, color, title, desc) {
        return '<div style="display:flex;gap:12px;align-items:flex-start;">' +
            '<div style="width:36px;height:36px;border-radius:9px;background:' + color + '18;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' +
                '<i class="' + icon + '" style="color:' + color + ';font-size:1rem;"></i>' +
            '</div>' +
            '<div>' +
                '<div style="font-weight:700;font-size:0.87rem;margin-bottom:2px;">' + title + '</div>' +
                '<div style="font-size:0.78rem;color:var(--text-3);">' + desc + '</div>' +
            '</div>' +
        '</div>';
    }

    async function onbSendInvite() {
        const email = document.getElementById('onbInviteEmail')?.value?.trim();
        const msg   = document.getElementById('onbInviteMsg');
        if (!email) { msg.style.color = '#ef4444'; msg.textContent = 'Bitte E-Mail eingeben.'; return; }
        try {
            const res = await fetch('/users/haushalt/invite', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const d = await res.json();
            if (!res.ok) throw new Error(d.message);
            msg.style.color = '#10b981';
            msg.textContent = d.emailSent ? 'Einladung gesendet! Code: ' + d.code : 'Einladungscode: ' + d.code;
        } catch (err) { msg.style.color = '#ef4444'; msg.textContent = err.message || 'Fehler.'; }
    }

    async function createHaushalt() {
        const name    = document.getElementById('hausName').value.trim() || 'Unser Haushalt';
        const anzeige = document.getElementById('hausAnzeige').value.trim();
        const msg     = document.getElementById('setupMsg');
        try {
            const res = await fetch('/users/haushalt/create', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, anzeigename: anzeige })
            });
            const d = await res.json();
            if (!res.ok) throw new Error(d.message);
            renderOnboardingStep(document.getElementById('hausRoot'), 3);
        } catch (err) {
            const el = document.getElementById('setupMsg');
            if (el) { el.style.color = '#ef4444'; el.textContent = err.message; }
        }
    }

    async function joinHaushalt() {
        const code    = document.getElementById('joinCode').value.trim().toUpperCase();
        const anzeige = document.getElementById('joinAnzeige').value.trim();
        if (!code) {
            const el = document.getElementById('setupMsg');
            if (el) { el.style.color = '#ef4444'; el.textContent = 'Bitte Code eingeben.'; }
            return;
        }
        try {
            const res = await fetch('/users/haushalt/einladung/' + code + '/accept', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ anzeigename: anzeige })
            });
            const d = await res.json();
            if (!res.ok) throw new Error(d.message);
            const el = document.getElementById('setupMsg');
            if (el) { el.style.color = '#10b981'; el.textContent = 'Erfolgreich beigetreten! Lade…'; }
            setTimeout(() => location.reload(), 800);
        } catch (err) {
            const el = document.getElementById('setupMsg');
            if (el) { el.style.color = '#ef4444'; el.textContent = err.message; }
        }
    }

    // Modul-Scope für Person-Drill-down (client-side filter)
    let _dashAusgRes   = [];
    let _dashMitglieder = [];
    let _dashMonatStr  = '';

    // ── Dashboard ──────────────────────────────────────────────────
    async function renderDashboard(root, statusData) {
        const { haushalt, mitglieder, konten = [], gesamtBalance = 0, settings = { split_user1: 50, split_user2: 50 } } = statusData;
        const monatStr   = new Date().toISOString().substring(0, 7);
        const monatLabel = new Date().toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });

        const [fixkRes, persRes, gehRes, ausgRes, todoRes, dokRes, sparzRes, budgetRes, overrideRes, settlementRes] = await Promise.all([
            fetch('/users/haushalt/fixkosten').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/persoenlich').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/gehaelter?monat='+monatStr).then(r=>r.json()).catch(()=>({defaults:[],monat:[]})),
            fetch('/users/haushalt/transaktionen').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/todos/data').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/dokumente/data').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/sparziele').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/budgets').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/fixkosten/monat/'+monatStr).then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/settlement/'+monatStr).then(r=>r.json()).catch(()=>null),
        ]);

        // Für Person-Drill-down Client-seitig verfügbar machen
        _dashAusgRes    = ausgRes;
        _dashMitglieder = mitglieder;
        _dashMonatStr   = monatStr;

        const user1 = mitglieder[0] || {};
        const user2 = mitglieder[1] || null;
        const name1 = user1.anzeigename || user1.display_name || 'Person 1';
        const name2 = user2 ? (user2.anzeigename || user2.display_name || 'Person 2') : null;

        function getEffektiv(f) {
            const ov = overrideRes.find(o => o.fixkosten_id == f.id);
            return { betrag: ov?.betrag ?? f.betrag, a1: ov?.anteil_user1 ?? f.anteil_user1, a2: ov?.anteil_user2 ?? f.anteil_user2 };
        }
        function getGehalt(userId) {
            const m = gehRes.monat.find(g => g.user_id === userId);
            return m || gehRes.defaults.find(g => g.user_id === userId) || { gehalt: 0, sparbetrag: 0 };
        }

        // Monatszahlen
        const monatsAusg  = ausgRes.filter(a => a.type === 'Ausgaben'  && (a.date||'').startsWith(monatStr));
        const monatsEinn  = ausgRes.filter(a => a.type === 'Einnahmen' && (a.date||'').startsWith(monatStr));
        const totalAusgaben  = monatsAusg.reduce((s,a)  => s + (a.amount||0), 0);
        const totalEinnahmen = monatsEinn.reduce((s,a) => s + (a.amount||0), 0);
        const totalFixkosten = fixkRes.reduce((s,f) => s + getEffektiv(f).betrag, 0);
        const totalGehalt    = [user1, user2].filter(Boolean).reduce((s,u) => s + (getGehalt(u.user_id).gehalt||0), 0);
        const sparquote = totalGehalt > 0 ? ((totalGehalt - totalAusgaben) / totalGehalt * 100) : 0;

        // Personen-Daten
        const splitPct1 = settings.split_user1 ?? 50;
        const splitPct2 = settings.split_user2 ?? 50;
        function personData(u) {
            if (!u) return null;
            const geh    = getGehalt(u.user_id);
            const splitP = u.user_id === user1.user_id ? splitPct1 : splitPct2;
            const anteil = fixkRes.reduce((s,f) => {
                const e = getEffektiv(f);
                return s + e.betrag * splitP / 100;
            }, 0);
            const pers    = persRes.filter(p => p.user_id === u.user_id).reduce((s,p) => s+p.betrag, 0);
            const freiAusg = monatsAusg.reduce((s,a) => {
                return s + (a.amount||0) * splitP / 100;
            }, 0);
            const frei = geh.gehalt - anteil - pers - freiAusg - (geh.sparbetrag||0);
            return { geh, anteil, pers, freiAusg, frei };
        }
        const pd1 = personData(user1);
        const pd2 = personData(user2);

        // Offene Rechnungen
        const offeneRechnungen      = dokRes.filter(d => d.typ === 'rechnung' && d.status !== 'bezahlt');
        const offeneRechnungenSumme = offeneRechnungen.reduce((s,d) => s + (d.betrag||0), 0);
        const ueberfaelligeBills    = offeneRechnungen.filter(d => d.faellig_datum && new Date(d.faellig_datum) < new Date());

        // To-Dos
        const offeneTodos   = todoRes.filter(t => !t.completed);
        const hochTodos     = offeneTodos.filter(t => t.priority === 'hoch');

        // Letzte 5 Transaktionen
        const letzteTransaktionen = [...ausgRes].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0, 6);

        // Insights berechnen
        const insights = buildInsights({
            totalAusgaben, totalFixkosten, totalGehalt, sparquote,
            budgetRes, monatsAusg, monatStr, offeneRechnungen,
            ueberfaelligeBills, hochTodos, sparzRes
        });

        // Sparziele
        const sparzTotal = sparzRes.reduce((s,z) => s + (z.aktuell||0), 0);

        // Konten-Label
        const kontenLabel = konten.length === 0 ? 'Kein Konto' :
                            konten.length === 1 ? escHtml(konten[0].name) :
                            konten.length + ' Konten';
        const gesamtColor = gesamtBalance < 0 ? '#ef4444' : 'var(--text-1)';

        // Vormonat vergleich
        const vormonat = new Date(); vormonat.setMonth(vormonat.getMonth() - 1);
        const vormonatStr = vormonat.toISOString().substring(0, 7);
        const vormonatAusg = ausgRes.filter(a => a.type==='Ausgaben' && (a.date||'').startsWith(vormonatStr)).reduce((s,a) => s+(a.amount||0), 0);
        const deltaAusgaben = vormonatAusg > 0 ? ((totalAusgaben - vormonatAusg) / vormonatAusg * 100) : null;

        // Einladungs-Sektion
        const inviteSection = !user2 ? buildInviteSection() : '';

        root.innerHTML =
            // Header
            '<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;">' +
                '<div>' +
                    '<h1><i class="ri-home-heart-line" style="color:var(--haus-accent);margin-right:8px;"></i>' + escHtml(haushalt.name) + '</h1>' +
                    '<p>Haushaltsübersicht · ' + monatLabel + '</p>' +
                '</div>' +
                '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
                    '<a href="/users/haushalt/tracker" style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-md);background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.3);font-size:0.85rem;text-decoration:none;font-weight:600;"><i class="ri-add-line"></i> Transaktion</a>' +
                    '<a href="/users/haushalt/ausgaben" style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-md);background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);font-size:0.85rem;text-decoration:none;"><i class="ri-exchange-funds-line"></i> Planung</a>' +
                    '<a href="/users/haushalt/todos" style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-md);background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);font-size:0.85rem;text-decoration:none;"><i class="ri-checkbox-line"></i> Aufgaben</a>' +
                '</div>' +
            '</div>' +

            inviteSection +

            // Insights (nur wenn vorhanden)
            (insights.length > 0 ? '<div class="haus-insights">' + insights.join('') + '</div>' : '') +

            // Monatsbeitrag-Widget
            renderBeitragWidget(mitglieder, user1, user2, name1, name2, splitPct1, splitPct2, fixkRes, overrideRes, konten, monatLabel) +

            // Stat-Cards
            '<div class="haus-stats">' +
                statCard('green', 'ri-bank-card-line', kontenLabel, fmt.format(gesamtBalance), '', true, '/users/haushalt/konto', 'color:'+gesamtColor) +
                statCard('green', 'ri-arrow-up-circle-line', 'Einnahmen ' + monatLabel, fmt.format(totalEinnahmen), '', false, null, 'color:#22c55e') +
                statCard('red', 'ri-arrow-down-circle-line', 'Ausgaben ' + monatLabel, fmt.format(totalAusgaben),
                    deltaAusgaben !== null ? (deltaAusgaben > 0 ? '▲ ' : '▼ ') + Math.abs(deltaAusgaben).toFixed(0) + '% ggü. Vormonat' : '', false, null, 'color:#ef4444') +
                statCard('blue', 'ri-repeat-line', 'Gemeins. Fixkosten', fmt.format(totalFixkosten), '', true, '/users/haushalt/ausgaben') +
                statCard(offeneRechnungen.length > 0 ? 'amber' : 'green', 'ri-bill-line', 'Offene Rechnungen',
                    offeneRechnungen.length > 0 ? offeneRechnungen.length + ' · ' + fmt.format(offeneRechnungenSumme) : 'Alles bezahlt ✓',
                    ueberfaelligeBills.length > 0 ? ueberfaelligeBills.length + ' überfällig' : '',
                    true, '/users/haushalt/dokumente',
                    offeneRechnungen.length > 0 ? 'color:#f59e0b' : 'color:#22c55e') +
            '</div>' +

            // Hauptbereich
            '<div class="haus-main-grid">' +
                // Links
                '<div class="haus-left">' +
                    // Personen-Karten (Plan vs. Realität)
                    '<div class="card">' +
                        '<div class="card-header">' +
                            '<h3><i class="ri-scales-line" style="color:var(--haus-accent);margin-right:6px;"></i>Monatsbalance ' + monatLabel + '</h3>' +
                            '<a href="/users/haushalt/ausgaben" style="font-size:0.82rem;color:var(--text-3);">Details <i class="ri-arrow-right-line"></i></a>' +
                        '</div>' +
                        '<div class="haus-person-grid">' +
                            renderPersonCard(name1, pd1, '#10b981', user1.user_id) +
                            (user2 && pd2 ? renderPersonCard(name2, pd2, '#3b82f6', user2.user_id) :
                                '<div style="display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:0.85rem;padding:20px;border:1px dashed var(--border);border-radius:var(--radius-md);">Noch kein Partner</div>') +
                        '</div>' +
                    '</div>' +

                    // Letzte Transaktionen
                    '<div class="card">' +
                        '<div class="card-header">' +
                            '<h3><i class="ri-exchange-2-line" style="color:var(--haus-accent);margin-right:6px;"></i>Letzte Transaktionen</h3>' +
                            '<a href="/users/haushalt/tracker" style="font-size:0.82rem;color:var(--text-3);">Alle <i class="ri-arrow-right-line"></i></a>' +
                        '</div>' +
                        (letzteTransaktionen.length === 0
                            ? '<div style="color:var(--text-3);font-size:0.85rem;text-align:center;padding:24px;">Noch keine Transaktionen erfasst.</div>'
                            : letzteTransaktionen.map(t => renderTxRow(t, mitglieder)).join('')) +
                    '</div>' +

                    // Diese Woche
                    renderWeeklyWidget(ausgRes, mitglieder) +

                    // Budgets Schnellübersicht (wenn vorhanden)
                    (budgetRes.length > 0 ? renderBudgetWidget(budgetRes, monatsAusg) : '') +
                '</div>' +

                // Rechts: Sidebar
                '<div class="haus-right">' +
                    // Sparziele
                    '<div class="card">' +
                        '<div class="card-header">' +
                            '<h3><i class="ri-trophy-line" style="color:#f59e0b;margin-right:6px;"></i>Sparziele</h3>' +
                            '<a href="/users/haushalt/ausgaben?tab=sparziele" style="font-size:0.82rem;color:var(--text-3);">Alle <i class="ri-arrow-right-line"></i></a>' +
                        '</div>' +
                        (sparzRes.length === 0
                            ? '<div style="text-align:center;padding:16px;color:var(--text-3);font-size:0.84rem;">Noch keine Sparziele. <a href="/users/haushalt/ausgaben?tab=sparziele" style="color:var(--haus-accent);">Jetzt anlegen →</a></div>'
                            : sparzRes.slice(0, 4).map(z => renderSparzielMini(z)).join('')) +
                        (sparzRes.length > 0 ? '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:0.8rem;color:var(--text-3);">Gesamt angespart: <strong style="color:var(--text-1);">' + fmt.format(sparzTotal) + '</strong></div>' : '') +
                    '</div>' +

                    // Settlement-Widget (nur wenn 2 Mitglieder und offener Betrag)
                    renderSettlementWidget(settlementRes, monatLabel) +

                    // Aufgaben
                    '<div class="card">' +
                        '<div class="card-header">' +
                            '<h3><i class="ri-checkbox-line" style="color:var(--haus-accent);margin-right:6px;"></i>Offene Aufgaben</h3>' +
                            '<a href="/users/haushalt/todos" style="font-size:0.82rem;color:var(--text-3);">Alle <i class="ri-arrow-right-line"></i></a>' +
                        '</div>' +
                        (offeneTodos.length === 0
                            ? '<div style="color:var(--text-3);font-size:0.85rem;text-align:center;padding:16px;">Alle erledigt 🎉</div>'
                            : offeneTodos.slice(0, 5).map(t => {
                                const prio = { hoch:'#ef4444', mittel:'#f59e0b', niedrig:'#22c55e' };
                                return '<div class="haus-split-row">' +
                                    '<div style="display:flex;align-items:center;gap:8px;">' +
                                        '<div style="width:7px;height:7px;border-radius:50%;background:' + (prio[t.priority]||'#aaa') + ';flex-shrink:0;"></div>' +
                                        '<span style="font-weight:500;font-size:0.83rem;">' + escHtml(t.task) + '</span>' +
                                    '</div>' +
                                    (t.due_date ? '<span style="font-size:0.73rem;color:' + (new Date(t.due_date)<new Date()&&!t.completed ? '#ef4444' : 'var(--text-3)') + ';">' + new Date(t.due_date).toLocaleDateString('de-DE',{day:'2-digit',month:'short'}) + '</span>' : '') +
                                '</div>';
                              }).join('')) +
                    '</div>' +

                    // Mitglieder
                    '<div class="card">' +
                        '<div class="card-header"><h3><i class="ri-group-line" style="color:var(--haus-accent);margin-right:6px;"></i>Mitglieder</h3>' +
                            '<a href="/users/haushalt/einstellungen" style="font-size:0.82rem;color:var(--text-3);"><i class="ri-settings-line"></i></a>' +
                        '</div>' +
                        mitglieder.map(m =>
                            '<div class="haus-member-card">' +
                                '<div class="haus-member-avatar">' + (m.anzeigename||m.display_name||'?').charAt(0).toUpperCase() + '</div>' +
                                '<div><div style="font-weight:700;font-size:0.87rem;">' + escHtml(m.anzeigename||m.display_name||'Unbekannt') + '</div>' +
                                '<div style="font-size:0.73rem;color:var(--text-3);">' + escHtml(m.email) + '</div></div>' +
                            '</div>'
                        ).join('') +
                    '</div>' +

                    // Offene Rechnungen
                    (offeneRechnungen.length > 0 ? renderRechnungenWidget(offeneRechnungen) : '') +
                '</div>' +
            '</div>';
    }

    function statCard(color, icon, label, value, sub, clickable, link, valueStyle) {
        const clickAttr = clickable && link ? ' onclick="window.location.href=\'' + link + '\'"' : '';
        return '<div class="haus-stat-card' + (clickable && link ? ' clickable' : '') + '"' + clickAttr + '>' +
            '<div class="haus-stat-icon ' + color + '"><i class="' + icon + '"></i></div>' +
            '<div class="haus-stat-body">' +
                '<div class="haus-stat-label">' + label + '</div>' +
                '<div class="haus-stat-value" style="' + (valueStyle||'') + ';">' + value + '</div>' +
                (sub ? '<div class="haus-stat-sub">' + sub + '</div>' : '') +
            '</div>' +
        '</div>';
    }

    function renderPersonCard(name, pd, color, userId) {
        if (!pd) return '';
        const { geh, anteil, pers, freiAusg, frei } = pd;
        const totalKosten = anteil + pers + freiAusg;
        const auslastung  = geh.gehalt > 0 ? Math.min(100, totalKosten / geh.gehalt * 100) : 0;
        const clickAttr   = userId ? ' onclick="openPersonDetail(' + userId + ')" style="cursor:pointer;"' : '';
        return '<div class="haus-person-card" style="background:' + color + '10;border:1px solid ' + color + '28;"' + clickAttr + '>' +
            '<div style="font-weight:800;font-size:0.95rem;color:' + color + ';margin-bottom:12px;">' + escHtml(name) + '</div>' +
            '<div style="display:flex;flex-direction:column;gap:0;">' +
                personRow('Gehalt', fmt.format(geh.gehalt||0), '#22c55e', false) +
                personRow('Fixkosten-Anteil', '−' + fmt.format(anteil), '#ef4444', false) +
                personRow('Pers. Fixkosten', '−' + fmt.format(pers), '#ef4444', false) +
                personRow('Ist-Ausgaben', '−' + fmt.format(freiAusg), '#f59e0b', false) +
                personRow('Sparen', '−' + fmt.format(geh.sparbetrag||0), '#3b82f6', false) +
            '</div>' +
            '<div class="haus-person-total">' +
                '<span>Verfügbar</span>' +
                '<span style="color:' + (frei>=0?'#22c55e':'#ef4444') + ';">' + fmt.format(frei) + '</span>' +
            '</div>' +
            '<div style="margin-top:8px;">' +
                '<div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-3);margin-bottom:4px;"><span>Budgetauslastung</span><span>' + auslastung.toFixed(0) + '%</span></div>' +
                '<div class="haus-progress"><div class="haus-progress-fill" style="width:' + auslastung + '%;background:' + (auslastung>90?'#ef4444':auslastung>70?'#f59e0b':color) + ';"></div></div>' +
            '</div>' +
            (userId ? '<div style="margin-top:10px;font-size:0.72rem;color:' + color + ';opacity:0.7;text-align:right;">Transaktionen anzeigen →</div>' : '') +
        '</div>';
    }

    function personRow(label, value, color, border) {
        return '<div class="haus-person-row"><span style="color:var(--text-3);">' + label + '</span><span style="font-weight:600;color:' + color + ';">' + value + '</span></div>';
    }

    function renderTxRow(t, mitglieder) {
        const isAusgabe = t.type === 'Ausgaben';
        const eintrag   = mitglieder.find(m => m.user_id === t.eingetragen_von);
        return '<div class="haus-tx-row">' +
            '<div style="width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:' + (isAusgabe?'rgba(239,68,68,0.1)':'rgba(34,197,94,0.1)') + ';color:' + (isAusgabe?'#ef4444':'#22c55e') + ';"><i class="' + (isAusgabe?'ri-arrow-down-line':'ri-arrow-up-line') + '"></i></div>' +
            '<div style="flex:1;min-width:0;">' +
                '<div style="font-weight:600;font-size:0.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(t.name||t.description||'—') + '</div>' +
                '<div style="font-size:0.71rem;color:var(--text-3);">' + (t.date ? new Date(t.date).toLocaleDateString('de-DE',{day:'2-digit',month:'short'}) : '—') + (eintrag ? ' · ' + escHtml(eintrag.anzeigename||eintrag.display_name||'') : '') + (t.category ? ' · ' + escHtml(t.category) : '') + '</div>' +
            '</div>' +
            '<span style="font-weight:700;font-size:0.88rem;color:' + (isAusgabe?'#ef4444':'#22c55e') + ';white-space:nowrap;">' + (isAusgabe?'−':'+') + fmt.format(t.amount||0) + '</span>' +
        '</div>';
    }

    function renderSparzielMini(z) {
        const pct = z.zielbetrag > 0 ? Math.min(100, z.aktuell / z.zielbetrag * 100) : 0;
        const daysLeft = z.faellig_datum ? Math.ceil((new Date(z.faellig_datum) - new Date()) / 86400000) : null;
        return '<div class="haus-sparziel-item">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">' +
                '<span style="font-weight:600;font-size:0.83rem;">' + escHtml(z.name) + '</span>' +
                '<span style="font-size:0.78rem;color:var(--text-3);">' + fmt.format(z.aktuell) + ' / ' + fmt.format(z.zielbetrag) + '</span>' +
            '</div>' +
            '<div class="haus-progress"><div class="haus-progress-fill" style="width:' + pct + '%;background:' + (z.farbe||'#10b981') + ';"></div></div>' +
            (daysLeft !== null ? '<div style="font-size:0.71rem;color:' + (daysLeft<14?'#f59e0b':'var(--text-3)') + ';margin-top:3px;">Ziel: ' + new Date(z.faellig_datum).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'}) + (daysLeft > 0 ? ' · noch ' + daysLeft + ' Tage' : ' · Termin überschritten') + '</div>' : '') +
        '</div>';
    }

    function renderWeeklyWidget(ausgRes, mitglieder) {
        const today = new Date();
        const dow = today.getDay() === 0 ? 6 : today.getDay() - 1; // Mo=0
        const weekStart = new Date(today);
        weekStart.setDate(today.getDate() - dow);
        weekStart.setHours(0, 0, 0, 0);
        const weekStartStr = weekStart.toISOString().substring(0, 10);
        const todayStr     = today.toISOString().substring(0, 10);

        const weekTx = ausgRes.filter(a =>
            a.type === 'Ausgaben' && a.date >= weekStartStr && a.date <= todayStr
        );

        const weekStartLabel = weekStart.toLocaleDateString('de-DE', { day: '2-digit', month: 'short' });
        const todayLabel     = today.toLocaleDateString('de-DE', { day: '2-digit', month: 'short' });

        if (weekTx.length === 0) {
            return '<div class="card">' +
                '<div class="card-header">' +
                    '<h3><i class="ri-calendar-week-line" style="color:var(--haus-accent);margin-right:6px;"></i>Diese Woche</h3>' +
                    '<span style="font-size:0.78rem;color:var(--text-3);">' + weekStartLabel + ' – ' + todayLabel + '</span>' +
                '</div>' +
                '<div style="color:var(--text-3);font-size:0.84rem;text-align:center;padding:20px;">Noch keine Ausgaben diese Woche 🎉</div>' +
            '</div>';
        }

        const totalWeek = weekTx.reduce((s, a) => s + (a.amount || 0), 0);

        const personRows = mitglieder.map(m => {
            const personTx    = weekTx.filter(a => a.eingetragen_von === m.user_id);
            const personTotal = personTx.reduce((s, a) => s + (a.amount || 0), 0);
            if (personTotal === 0) return '';
            const byKat = {};
            personTx.forEach(a => { if (a.category) byKat[a.category] = (byKat[a.category] || 0) + (a.amount || 0); });
            const topKats = Object.entries(byKat).sort((a, b) => b[1] - a[1]).slice(0, 3);
            const name = m.anzeigename || m.display_name || 'Person';
            return '<div style="padding:10px 0;border-bottom:1px solid var(--border);">' +
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
                    '<span style="font-weight:700;font-size:0.87rem;">' + escHtml(name) + '</span>' +
                    '<span style="font-weight:800;color:#ef4444;">' + fmt.format(personTotal) + '</span>' +
                '</div>' +
                '<div style="display:flex;gap:5px;flex-wrap:wrap;">' +
                    topKats.map(([kat, val]) =>
                        '<span style="font-size:0.71rem;background:var(--surface-2);border:1px solid var(--border);padding:2px 7px;border-radius:20px;color:var(--text-2);">' + escHtml(kat) + ' · ' + fmt.format(val) + '</span>'
                    ).join('') +
                '</div>' +
            '</div>';
        }).filter(Boolean).join('');

        return '<div class="card">' +
            '<div class="card-header">' +
                '<h3><i class="ri-calendar-week-line" style="color:var(--haus-accent);margin-right:6px;"></i>Diese Woche</h3>' +
                '<a href="/users/haushalt/tracker" style="font-size:0.82rem;color:var(--text-3);">Alle <i class="ri-arrow-right-line"></i></a>' +
            '</div>' +
            '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 10px;border-bottom:1px solid var(--border);margin-bottom:2px;">' +
                '<span style="font-size:0.78rem;color:var(--text-3);">' + weekStartLabel + ' – ' + todayLabel + ' · ' + weekTx.length + ' Ausgaben</span>' +
                '<span style="font-weight:800;font-size:1.05rem;color:#ef4444;">' + fmt.format(totalWeek) + '</span>' +
            '</div>' +
            personRows +
        '</div>';
    }

    function renderBudgetWidget(budgetRes, monatsAusg) {
        const byKat = {};
        monatsAusg.forEach(a => { if (a.category) byKat[a.category] = (byKat[a.category]||0) + (a.amount||0); });
        const budgetItems = budgetRes.map(b => {
            const ausgegeben = byKat[b.kategorie] || 0;
            const pct = b.betrag > 0 ? Math.min(100, ausgegeben / b.betrag * 100) : 0;
            return { ...b, ausgegeben, pct };
        }).filter(b => b.betrag > 0);
        if (budgetItems.length === 0) return '';
        return '<div class="card">' +
            '<div class="card-header">' +
                '<h3><i class="ri-pie-chart-2-line" style="color:var(--haus-accent);margin-right:6px;"></i>Budgets ' + new Date().toLocaleDateString('de-DE',{month:'long'}) + '</h3>' +
                '<a href="/users/haushalt/ausgaben?tab=budget" style="font-size:0.82rem;color:var(--text-3);">Verwalten <i class="ri-arrow-right-line"></i></a>' +
            '</div>' +
            budgetItems.slice(0, 6).map(b =>
                '<div style="margin-bottom:12px;">' +
                    '<div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:0.81rem;">' +
                        '<span style="font-weight:600;">' + escHtml(b.kategorie) + '</span>' +
                        '<span style="color:' + (b.pct > 90 ? '#ef4444' : b.pct > 70 ? '#f59e0b' : 'var(--text-3)') + ';">' + fmt.format(b.ausgegeben) + ' / ' + fmt.format(b.betrag) + '</span>' +
                    '</div>' +
                    '<div class="haus-progress"><div class="haus-progress-fill" style="width:' + b.pct + '%;background:' + (b.pct>90?'#ef4444':b.pct>70?'#f59e0b':'#10b981') + ';"></div></div>' +
                '</div>'
            ).join('') +
        '</div>';
    }

    function renderRechnungenWidget(rechnungen) {
        return '<div class="card">' +
            '<div class="card-header"><h3><i class="ri-bill-line" style="color:#f59e0b;margin-right:6px;"></i>Offene Rechnungen</h3>' +
                '<a href="/users/haushalt/dokumente" style="font-size:0.82rem;color:var(--text-3);">Alle <i class="ri-arrow-right-line"></i></a>' +
            '</div>' +
            rechnungen.slice(0, 4).map(d => {
                const ueberfaellig = d.faellig_datum && new Date(d.faellig_datum) < new Date();
                return '<div class="haus-split-row">' +
                    '<div><div style="font-weight:600;font-size:0.83rem;">' + escHtml(d.name) + '</div>' +
                    '<div style="font-size:0.71rem;color:' + (ueberfaellig?'#ef4444':'var(--text-3)') + ';">' + (d.faellig_datum ? (ueberfaellig?'⚠ Überfällig · ':'Fällig · ') + new Date(d.faellig_datum).toLocaleDateString('de-DE',{day:'2-digit',month:'short'}) : '—') + '</div></div>' +
                    (d.betrag ? '<span style="font-weight:700;font-size:0.83rem;color:#f59e0b;">' + fmt.format(d.betrag) + '</span>' : '') +
                '</div>';
            }).join('') +
        '</div>';
    }

    // ── Settlement-Widget ──────────────────────────────────────────
    function renderSettlementWidget(data, monatLabel) {
        if (!data || !data.owes) return '';
        const owes = data.owes;
        const fromName = escHtml(owes.from.anzeigename || 'Person');
        const toName   = escHtml(owes.to.anzeigename || 'Person');
        return '<div class="card">' +
            '<div class="card-header">' +
                '<h3><i class="ri-scales-line" style="color:#f59e0b;margin-right:6px;"></i>Abrechnung</h3>' +
                '<a href="/users/haushalt/ausgaben?tab=abrechnung" style="font-size:0.82rem;color:var(--text-3);">Details <i class="ri-arrow-right-line"></i></a>' +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;">' +
                '<div style="width:36px;height:36px;border-radius:50%;background:rgba(245,158,11,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;">' +
                    '<i class="ri-exchange-dollar-line" style="color:#f59e0b;"></i>' +
                '</div>' +
                '<div style="flex:1;font-size:0.84rem;">' +
                    '<span style="font-weight:700;">' + fromName + '</span>' +
                    ' schuldet ' +
                    '<span style="font-weight:700;">' + toName + '</span>' +
                '</div>' +
                '<span style="font-weight:800;color:#f59e0b;">' + fmt.format(owes.amount) + '</span>' +
            '</div>' +
            '<a href="/users/haushalt/ausgaben?tab=abrechnung" style="display:block;margin-top:10px;padding:7px;border-radius:var(--radius-md);background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);color:#b45309;font-size:0.8rem;font-weight:600;text-align:center;text-decoration:none;">' +
                '<i class="ri-exchange-dollar-line"></i> Ausgleich buchen' +
            '</a>' +
        '</div>';
    }

    // ── Monatsbeitrag ──────────────────────────────────────────────
    function renderBeitragWidget(mitglieder, user1, user2, name1, name2, splitPct1, splitPct2, fixkRes, overrideRes, konten, monatLabel) {
        if (fixkRes.length === 0 || !user2) return '';

        function monatlichBetrag(f) {
            const ov = overrideRes.find(o => o.fixkosten_id == f.id);
            const betrag = ov?.betrag ?? f.betrag;
            const r = f.rhythmus;
            if (r === 'jaehrlich')        return betrag / 12;
            if (r === 'halbjaehrlich')    return betrag / 6;
            if (r === 'vierteljaehrlich') return betrag / 3;
            return betrag;
        }

        const gesamtMonatlich = fixkRes.reduce((s, f) => s + monatlichBetrag(f), 0);
        const beitrag1 = gesamtMonatlich * splitPct1 / 100;
        const beitrag2 = gesamtMonatlich * splitPct2 / 100;
        const kontoId  = konten.length > 0 ? konten[0].id : null;

        return '<div class="card" style="padding:20px;margin-bottom:18px;border:2px solid rgba(16,185,129,0.25);background:rgba(16,185,129,0.03);">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">' +
                '<div>' +
                    '<h3 style="margin:0 0 3px;font-size:0.95rem;"><i class="ri-wallet-3-line" style="color:var(--haus-accent);margin-right:6px;"></i>Monatsbeitrag ' + monatLabel + '</h3>' +
                    '<p style="margin:0;font-size:0.78rem;color:var(--text-3);">Was jede Person diesen Monat zur Haushaltskasse beiträgt</p>' +
                '</div>' +
                '<a href="/users/haushalt/ausgaben?tab=fixkosten" style="font-size:0.78rem;color:var(--text-3);">Fixkosten verwalten <i class="ri-arrow-right-line"></i></a>' +
            '</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">' +
                renderBeitragPerson(name1, beitrag1, splitPct1, '#10b981', kontoId, user1.user_id) +
                renderBeitragPerson(name2, beitrag2, splitPct2, '#3b82f6', kontoId, user2.user_id) +
            '</div>' +
        '</div>';
    }

    function renderBeitragPerson(name, beitrag, pct, color, kontoId, userId) {
        return '<div style="background:' + color + '10;border:1px solid ' + color + '28;border-radius:var(--radius-md);padding:14px;">' +
            '<div style="font-weight:700;color:' + color + ';font-size:0.88rem;margin-bottom:8px;">' + escHtml(name) + ' · ' + pct + '%</div>' +
            '<div style="font-size:1.5rem;font-weight:800;margin-bottom:10px;">' + fmt.format(beitrag) + '</div>' +
            (kontoId ? '<button onclick="einzahlen(' + kontoId + ',' + beitrag.toFixed(2) + ',\'' + escHtml(name) + '\')" ' +
                'style="width:100%;padding:8px;border-radius:var(--radius-md);background:' + color + ';color:#fff;border:none;cursor:pointer;font-family:\'Plus Jakarta Sans\',sans-serif;font-size:0.82rem;font-weight:700;">' +
                '<i class="ri-add-circle-line"></i> Jetzt einzahlen' +
            '</button>' : '<div style="font-size:0.75rem;color:var(--text-3);">Kein Konto verknüpft</div>') +
        '</div>';
    }

    async function einzahlen(kontoId, betrag, name) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
        overlay.innerHTML =
            '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:400px;">' +
                '<h3 style="margin:0 0 6px;">Einzahlung von ' + escHtml(name) + '</h3>' +
                '<p style="font-size:0.83rem;color:var(--text-3);margin-bottom:18px;">Erstellt eine Einnahmen-Transaktion auf dem Haushaltskonto.</p>' +
                '<div class="form-group" style="margin-bottom:16px;">' +
                    '<label class="form-label">Betrag</label>' +
                    '<input type="number" id="einzBetrag" value="' + betrag + '" step="0.01" style="font-size:1.1rem;font-weight:700;">' +
                '</div>' +
                '<div class="form-group" style="margin-bottom:20px;">' +
                    '<label class="form-label">Notiz</label>' +
                    '<input type="text" id="einzNotiz" value="Monatsbeitrag ' + escHtml(name) + '" placeholder="Monatsbeitrag">' +
                '</div>' +
                '<div style="display:flex;gap:8px;">' +
                    '<button id="einzSave" style="flex:1;padding:10px;border-radius:var(--radius-md);background:var(--haus-accent);color:#fff;border:none;cursor:pointer;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:700;"><i class="ri-check-line"></i> Einzahlen</button>' +
                    '<button onclick="this.closest(\'div[style]\').remove()" style="padding:10px 16px;border-radius:var(--radius-md);background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);cursor:pointer;font-family:\'Plus Jakarta Sans\',sans-serif;">Abbrechen</button>' +
                '</div>' +
                '<div id="einzMsg" style="margin-top:8px;font-size:0.83rem;"></div>' +
            '</div>';
        document.body.appendChild(overlay);
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        document.getElementById('einzSave').onclick = async () => {
            const b = parseFloat(document.getElementById('einzBetrag').value);
            const n = document.getElementById('einzNotiz').value.trim();
            if (!b || b <= 0) { document.getElementById('einzMsg').style.color='#ef4444'; document.getElementById('einzMsg').textContent='Bitte Betrag eingeben.'; return; }
            const res = await fetch('/users/haushalt/transaktionen/add', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: n || 'Monatsbeitrag', amount: b, type: 'Einnahmen', konto_id: kontoId, date: new Date().toISOString().substring(0,10), category: 'Monatsbeitrag' })
            });
            if (!res.ok) { document.getElementById('einzMsg').style.color='#ef4444'; document.getElementById('einzMsg').textContent='Fehler beim Speichern.'; return; }
            overlay.remove();
            location.reload();
        };
    }

    // ── Insights ───────────────────────────────────────────────────
    function buildInsights({ totalAusgaben, totalFixkosten, totalGehalt, sparquote, budgetRes, monatsAusg, monatStr, offeneRechnungen, ueberfaelligeBills, hochTodos, sparzRes }) {
        const alerts = [];
        const heute = new Date();
        const tagImMonat = heute.getDate();
        const tageImMonat = new Date(heute.getFullYear(), heute.getMonth()+1, 0).getDate();
        const monatsfortschritt = tagImMonat / tageImMonat;

        // Budget-Überschreitungen
        const byKat = {};
        monatsAusg.forEach(a => { if (a.category) byKat[a.category] = (byKat[a.category]||0)+(a.amount||0); });
        budgetRes.forEach(b => {
            if (!b.betrag) return;
            const ausg = byKat[b.kategorie] || 0;
            const pct = ausg / b.betrag;
            if (pct > 1) {
                alerts.push(alert('danger', 'ri-alert-line', '<strong>' + escHtml(b.kategorie) + '</strong>: Budget überschritten — ' + fmt.format(ausg) + ' von ' + fmt.format(b.betrag) + ' (' + (pct*100).toFixed(0) + '%). <a href="/users/haushalt/ausgaben?tab=budget">Details →</a>'));
            } else if (pct > 0.8 && monatsfortschritt < 0.85) {
                alerts.push(alert('warn', 'ri-error-warning-line', '<strong>' + escHtml(b.kategorie) + '</strong>: ' + (pct*100).toFixed(0) + '% des Budgets verbraucht, noch ' + (tageImMonat - tagImMonat) + ' Tage im Monat.'));
            }
        });

        // Überfällige Rechnungen
        if (ueberfaelligeBills.length > 0) {
            alerts.push(alert('danger', 'ri-time-line', ueberfaelligeBills.length + ' Rechnung' + (ueberfaelligeBills.length>1?'en sind':'ist') + ' überfällig: <strong>' + ueberfaelligeBills.slice(0,2).map(d=>escHtml(d.name)).join(', ') + '</strong>. <a href="/users/haushalt/dokumente">Jetzt bezahlen →</a>'));
        }

        // Bald fällige Rechnungen (7 Tage)
        const baldFaellig = offeneRechnungen.filter(d => {
            if (!d.faellig_datum) return false;
            const diff = (new Date(d.faellig_datum) - heute) / 86400000;
            return diff >= 0 && diff <= 7;
        });
        if (baldFaellig.length > 0 && ueberfaelligeBills.length === 0) {
            alerts.push(alert('warn', 'ri-calendar-event-line', baldFaellig.length + ' Rechnung' + (baldFaellig.length>1?'en fällig':'fällig') + ' in den nächsten 7 Tagen: <strong>' + baldFaellig.slice(0,2).map(d=>escHtml(d.name)).join(', ') + '</strong>.'));
        }

        // Hohe offene To-Dos
        if (hochTodos.length > 2) {
            alerts.push(alert('info', 'ri-checkbox-line', hochTodos.length + ' Aufgaben mit hoher Priorität noch offen. <a href="/users/haushalt/todos">Aufgaben ansehen →</a>'));
        }

        // Sparziel-Zieldatum nah
        sparzRes.forEach(z => {
            if (!z.faellig_datum) return;
            const diff = (new Date(z.faellig_datum) - heute) / 86400000;
            const pct  = z.zielbetrag > 0 ? z.aktuell / z.zielbetrag : 1;
            if (diff > 0 && diff <= 30 && pct < 0.9) {
                const fehlt = z.zielbetrag - z.aktuell;
                alerts.push(alert('warn', 'ri-trophy-line', 'Sparziel <strong>' + escHtml(z.name) + '</strong>: noch ' + fmt.format(fehlt) + ' fehlen — Zieldatum in ' + Math.ceil(diff) + ' Tagen.'));
            }
        });

        // Positiv: Niedrige Ausgaben
        if (alerts.length === 0 && totalGehalt > 0 && totalAusgaben < totalGehalt * 0.6) {
            alerts.push(alert('good', 'ri-thumb-up-line', 'Ihr liegt gut im Monat! Ausgaben bei ' + (totalAusgaben/totalGehalt*100).toFixed(0) + '% des Einkommens — bleibt so 💪'));
        }

        return alerts.slice(0, 3); // max 3 Insights
    }

    function alert(type, icon, message) {
        return '<div class="haus-alert ' + type + '"><i class="' + icon + '"></i><span>' + message + '</span></div>';
    }

    function buildInviteSection() {
        return '<div class="card" style="margin-bottom:18px;padding:18px;">' +
            '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
                '<div style="width:34px;height:34px;border-radius:9px;background:rgba(245,158,11,0.12);color:#f59e0b;display:flex;align-items:center;justify-content:center;"><i class="ri-user-add-line"></i></div>' +
                '<div><div style="font-weight:700;font-size:0.88rem;">Partner einladen</div><div style="font-size:0.75rem;color:var(--text-3);">Noch kein zweites Mitglied in diesem Haushalt</div></div>' +
            '</div>' +
            '<div style="display:flex;gap:8px;">' +
                '<input type="text" id="inviteEmail" placeholder="E-Mail des Partners" style="flex:1;padding:8px 12px;border-radius:var(--radius-md);background:var(--surface-2);border:1px solid var(--border);color:var(--text-1);font-family:\'Plus Jakarta Sans\',sans-serif;font-size:0.84rem;">' +
                '<button onclick="sendInvite()" style="padding:8px 16px;border-radius:var(--radius-md);background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.3);cursor:pointer;font-size:0.84rem;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:600;">Code generieren</button>' +
            '</div>' +
            '<div id="inviteResult"></div>' +
        '</div>';
    }

    async function sendInvite() {
        const email  = document.getElementById('inviteEmail').value.trim();
        const result = document.getElementById('inviteResult');
        if (!email) { result.innerHTML='<p style="color:#ef4444;font-size:0.84rem;margin-top:8px;">Bitte E-Mail eingeben.</p>'; return; }
        try {
            const res = await fetch('/users/haushalt/invite', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
            const d = await res.json();
            if (!res.ok) throw new Error(d.message);
            result.innerHTML =
                '<div class="haus-invite-box">' +
                    '<div><div style="font-size:0.72rem;color:var(--text-3);margin-bottom:3px;">Einladungscode für ' + escHtml(email) + '</div>' +
                    '<div class="haus-invite-code">' + d.code + '</div></div>' +
                    '<button onclick="navigator.clipboard.writeText(\'' + d.code + '\');this.textContent=\'✓ Kopiert\';" ' +
                    'style="padding:7px 12px;border-radius:var(--radius-md);background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.25);cursor:pointer;font-size:0.82rem;font-family:\'Plus Jakarta Sans\',sans-serif;">Kopieren</button>' +
                '</div>' +
                '<p style="font-size:0.77rem;color:var(--text-3);margin-top:6px;">Teile diesen Code mit ' + escHtml(email) + '. Er/Sie kann ihn unter "Einladung annehmen" eingeben.</p>';
        } catch (err) { result.innerHTML='<p style="color:#ef4444;font-size:0.84rem;margin-top:8px;">' + escHtml(err.message) + '</p>'; }
    }

    // ── Person Drill-down Modal ────────────────────────────────────
    function openPersonDetail(userId) {
        const person = _dashMitglieder.find(m => m.user_id === userId);
        if (!person) return;
        const name  = person.anzeigename || person.display_name || 'Person';
        const color = userId === (_dashMitglieder[0]?.user_id) ? '#10b981' : '#3b82f6';

        // Client-seitig filtern
        const txs = _dashAusgRes.filter(t =>
            t.eingetragen_von === userId &&
            t.type === 'Ausgaben' &&
            (t.date || '').startsWith(_dashMonatStr)
        ).sort((a, b) => (b.date || '') < (a.date || '') ? -1 : 1);

        const total = txs.reduce((s, t) => s + (t.amount || 0), 0);

        // Kategorie-Aufschlüsselung
        const byKat = {};
        txs.forEach(t => { const k = t.category || 'Sonstiges'; byKat[k] = (byKat[k] || 0) + (t.amount || 0); });
        const topKats = Object.entries(byKat).sort((a, b) => b[1] - a[1]).slice(0, 6);

        const katHtml = topKats.length === 0 ? '' :
            '<div style="margin-bottom:20px;">' +
                '<div style="font-size:0.72rem;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;">Nach Kategorie</div>' +
                topKats.map(([k, v]) => {
                    const pct = total > 0 ? v / total * 100 : 0;
                    return '<div style="margin-bottom:8px;">' +
                        '<div style="display:flex;justify-content:space-between;font-size:0.81rem;margin-bottom:3px;">' +
                            '<span style="font-weight:500;">' + escHtml(k) + '</span>' +
                            '<span style="color:#ef4444;">' + fmt.format(v) + ' <span style="color:var(--text-3);font-weight:400;">(' + pct.toFixed(0) + '%)</span></span>' +
                        '</div>' +
                        '<div style="background:var(--surface-2);border-radius:4px;height:5px;overflow:hidden;">' +
                            '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:4px;transition:width 0.4s;"></div>' +
                        '</div>' +
                    '</div>';
                }).join('') +
            '</div>';

        const txHtml = txs.length === 0
            ? '<p style="color:var(--text-3);text-align:center;padding:20px 0;font-size:0.85rem;">Keine Ausgaben diesen Monat.</p>'
            : txs.map(t =>
                '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">' +
                    '<div style="flex:1;min-width:0;">' +
                        '<div style="font-weight:600;font-size:0.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(t.name || '—') + '</div>' +
                        '<div style="font-size:0.71rem;color:var(--text-3);">' +
                            (t.date ? new Date(t.date).toLocaleDateString('de-DE', { day: '2-digit', month: 'short' }) : '—') +
                            (t.category ? ' · ' + escHtml(t.category) : '') +
                        '</div>' +
                    '</div>' +
                    '<span style="font-weight:700;font-size:0.85rem;color:#ef4444;white-space:nowrap;">−' + fmt.format(t.amount || 0) + '</span>' +
                '</div>'
            ).join('');

        const monatLabel = _dashMonatStr
            ? new Date(_dashMonatStr + '-01').toLocaleDateString('de-DE', { month: 'long', year: 'numeric' })
            : '';

        // Overlay bauen
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9000;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;';
        overlay.innerHTML =
            '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:520px;padding:24px;position:relative;">' +
                '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
                    '<div style="display:flex;align-items:center;gap:10px;">' +
                        '<div style="width:36px;height:36px;border-radius:10px;background:' + color + '18;color:' + color + ';display:flex;align-items:center;justify-content:center;font-size:1.1rem;">' +
                            '<i class="ri-user-3-line"></i>' +
                        '</div>' +
                        '<div>' +
                            '<div style="font-weight:800;font-size:1rem;">' + escHtml(name) + '</div>' +
                            '<div style="font-size:0.75rem;color:var(--text-3);">Ausgaben · ' + monatLabel + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<button onclick="this.closest(\'[data-person-overlay]\').remove()" style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text-2);font-size:1rem;">' +
                        '<i class="ri-close-line"></i>' +
                    '</button>' +
                '</div>' +
                '<div style="background:' + color + '12;border:1px solid ' + color + '30;border-radius:var(--radius-md);padding:14px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;">' +
                    '<span style="font-size:0.83rem;color:var(--text-2);">Gesamt ' + txs.length + ' Transaktion' + (txs.length !== 1 ? 'en' : '') + '</span>' +
                    '<span style="font-weight:800;font-size:1.1rem;color:#ef4444;">−' + fmt.format(total) + '</span>' +
                '</div>' +
                katHtml +
                '<div style="font-size:0.72rem;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">Transaktionen</div>' +
                '<div style="max-height:300px;overflow-y:auto;padding-right:4px;">' + txHtml + '</div>' +
            '</div>';
        overlay.setAttribute('data-person-overlay', '');
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        document.body.appendChild(overlay);
    }

    init();
    </script>
