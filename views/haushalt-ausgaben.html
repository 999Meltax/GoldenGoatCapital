<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haushalt Ausgaben – Golden Goat Capital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="/assets/goldengoat.png">
</head>
<body>
    <%- include('navheader.html') %>

    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div>
            <h1><i class="ri-exchange-funds-line" style="color:var(--haus-accent);margin-right:8px;"></i>Ausgaben & Kosten</h1>
            <p>Fixkosten, Aufteilung und freie Ausgaben des Haushalts</p>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <label class="form-label" style="margin:0;">Monat:</label>
            <input type="month" id="monatPicker" style="padding:7px 12px;border-radius:var(--radius-md);background:var(--surface-2);border:1px solid var(--border);color:var(--text-1);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;">
        </div>
    </div>

    <!-- Tabs -->
    <div class="aus-tab-strip">
        <button class="aus-tab active" id="tab-fixkosten" onclick="showTab('fixkosten',this)">Fixkosten</button>
        <button class="aus-tab" id="tab-budget" onclick="showTab('budget',this)">Budget</button>
        <button class="aus-tab" id="tab-sparziele" onclick="showTab('sparziele',this)">Sparziele</button>
        <button class="aus-tab" id="tab-persoenlich" onclick="showTab('persoenlich',this)">Persönliche Kosten</button>
        <button class="aus-tab" id="tab-gehaelter" onclick="showTab('gehaelter',this)">Gehälter</button>
        <button class="aus-tab" id="tab-uebersicht" onclick="showTab('uebersicht',this)">Monatsübersicht</button>
    </div>

    <div id="tabContent"></div>

    <%- include('footer.html') %>

    <style>
    .aus-tab-strip {
        display: flex; gap: 4px; background: var(--surface-2);
        border-radius: var(--radius-md); padding: 4px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .aus-tab {
        padding: 8px 16px; border: none; background: transparent;
        color: var(--text-3); border-radius: var(--radius-md);
        cursor: pointer; font-size: 0.83rem; font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 600; transition: var(--transition);
    }
    .aus-tab.active { background: var(--haus-accent); color: #fff; }
    .aus-tab:hover:not(.active) { background: var(--surface); color: var(--text-1); }
    @media (max-width: 768px) {
        .aus-tab-strip { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .aus-tab-strip::-webkit-scrollbar { display: none; }
        .aus-tab { white-space: nowrap; flex-shrink: 0; }
    }

    .split-slider-row {
        display: flex; align-items: center; gap: 12px; margin-top: 8px;
    }
    .split-label { font-size: 0.78rem; color: var(--text-3); min-width: 30px; text-align: center; }
    .split-slider { flex: 1; accent-color: var(--haus-accent); }

    .aus-row {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.84rem;
    }
    .aus-row:last-child { border-bottom: none; }

    .ueber-person {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
    }
    .ueber-row {
        display: flex; justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.84rem;
    }
    .ueber-row:last-child { border-bottom: none; }
    .ueber-total {
        display: flex; justify-content: space-between;
        padding-top: 10px; margin-top: 4px;
        border-top: 2px solid var(--border);
        font-weight: 800; font-size: 0.95rem;
    }
    </style>

    <script src="/navheader.js"></script>
    <script>
    const fmt = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' });
    let currentTab = 'fixkosten';
    let haushalt = null;
    let mitglieder = [];
    let user1 = {}, user2 = null;
    let globalSettings = { split_user1: 50, split_user2: 50 };

    // Monat-Picker initialisieren
    const picker = document.getElementById('monatPicker');
    picker.value = new Date().toISOString().substring(0,7);
    picker.addEventListener('change', () => loadTab(currentTab));

    async function init() {
        const res = await fetch('/users/haushalt/status');
        const data = await res.json();
        haushalt = data.haushalt;
        mitglieder = data.mitglieder || [];
        user1 = mitglieder[0] || {};
        user2 = mitglieder[1] || null;
        if (data.settings) globalSettings = data.settings;
        // Tab aus URL-Parameter lesen
        const urlTab = new URLSearchParams(window.location.search).get('tab') || 'fixkosten';
        const btn = document.getElementById('tab-' + urlTab);
        if (btn) { document.querySelectorAll('.aus-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentTab = urlTab; }
        loadTab(urlTab);
    }

    function showTab(tab, btn) {
        document.querySelectorAll('.aus-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = tab;
        history.replaceState(null, '', '?tab=' + tab);
        loadTab(tab);
    }

    function loadTab(tab) {
        const root = document.getElementById('tabContent');
        root.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-3);"><i class="ri-loader-4-line" style="animation:spin 1s linear infinite;font-size:1.5rem;"></i></div>';
        const fns = { fixkosten: loadFixkosten, budget: loadBudget, sparziele: loadSparziele, persoenlich: loadPersoenlich, gehaelter: loadGehaelter, uebersicht: loadUebersicht };
        if (fns[tab]) fns[tab](root);
    }

    // ── Tab: Haushaltskasse (Fixkosten + globaler Split) ──────────
    async function loadFixkosten(root) {
        const monat = picker.value;
        const [fixkRes, overrideRes, splitMonatRes] = await Promise.all([
            fetch('/users/haushalt/fixkosten').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/fixkosten/monat/' + monat).then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/split/monat/' + monat).then(r=>r.json()).catch(()=>null),
        ]);
        const name1 = user1.anzeigename || 'Person 1';
        const name2 = user2 ? (user2.anzeigename || 'Person 2') : null;
        const splitOverride = splitMonatRes;
        const s1 = splitOverride ? splitOverride.split_user1 : globalSettings.split_user1;
        const s2 = splitOverride ? splitOverride.split_user2 : globalSettings.split_user2;

        // Effektiven monatlichen Betrag berechnen (Jahres-/Quartals-Kosten auf Monat umrechnen)
        function monatlichBetrag(f, effBetrag) {
            const r = f.rhythmus;
            if (r === 'jaehrlich')        return effBetrag / 12;
            if (r === 'halbjaehrlich')    return effBetrag / 6;
            if (r === 'vierteljaehrlich') return effBetrag / 3;
            return effBetrag; // monatlich
        }

        // Gesamte monatliche Kosten
        const gesamtMonatlich = fixkRes.reduce((s, f) => {
            const ov = overrideRes.find(o => o.fixkosten_id == f.id);
            return s + monatlichBetrag(f, ov?.betrag ?? f.betrag);
        }, 0);
        const beitrag1 = gesamtMonatlich * s1 / 100;
        const beitrag2 = gesamtMonatlich * s2 / 100;

        const katLabels = { wohnen:'🏠 Wohnen', lebensmittel:'🛒 Lebensmittel & Haushalt', transport:'🚗 Transport', freizeit:'🎉 Freizeit', versicherung:'🛡️ Versicherung', sonstiges:'📦 Sonstiges' };

        // ── Haushaltskasse-Widget ─────────────────────────────────
        let html =
            // Hinweis: Unterschied Fixkosten vs. Budget
            '<div style="background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.18);border-radius:var(--radius-md);padding:10px 16px;margin-bottom:14px;font-size:0.8rem;color:#1d4ed8;display:flex;align-items:flex-start;gap:8px;">' +
                '<i class="ri-information-line" style="flex-shrink:0;margin-top:1px;"></i>' +
                '<span><strong>Fixkosten</strong> sind eure wiederkehrenden Pflichtausgaben (Miete, Strom, GEZ…) — feste Beträge, die jeden Monat anfallen. ' +
                'Das <strong>Budget-Tab</strong> daneben legt Obergrenzen für variable Ausgaben (Lebensmittel, Freizeit…) fest und zeigt ob ihr sie einhaltet.</span>' +
            '</div>' +

            // 1. Beitrags-Karte oben
            '<div class="card" style="padding:22px;margin-bottom:16px;border:2px solid rgba(16,185,129,0.2);">' +
                '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;">' +
                    '<div>' +
                        '<h3 style="margin:0 0 3px;"><i class="ri-home-line" style="color:var(--haus-accent);margin-right:6px;"></i>Haushaltskasse</h3>' +
                        '<p style="margin:0;font-size:0.82rem;color:var(--text-3);">Monatliche Gesamtkosten und Beiträge pro Person</p>' +
                    '</div>' +
                    '<button onclick="openSplitSettings()" style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-md);background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);cursor:pointer;font-size:0.82rem;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:600;">' +
                        '<i class="ri-equalizer-line"></i> Aufteilung ändern' +
                    '</button>' +
                '</div>' +

                // Gesamt + Beiträge
                '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px;">' +
                    kpiBox('Gesamt / Monat', fmt.format(gesamtMonatlich), 'var(--text-1)') +
                    kpiBoxColor(name1, fmt.format(beitrag1), s1 + '%', '#10b981') +
                    (user2 ? kpiBoxColor(name2, fmt.format(beitrag2), s2 + '%', '#3b82f6') : '<div></div>') +
                '</div>' +

                // Split-Balken
                '<div style="margin-bottom:14px;">' +
                    '<div style="display:flex;border-radius:8px;overflow:hidden;height:14px;">' +
                        '<div style="width:' + s1 + '%;background:#10b981;transition:width 0.4s;"></div>' +
                        '<div style="width:' + s2 + '%;background:#3b82f6;transition:width 0.4s;"></div>' +
                    '</div>' +
                    '<div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-3);margin-top:4px;">' +
                        '<span style="color:#10b981;">' + escHtml(name1) + ' · ' + s1 + '%</span>' +
                        (user2 ? '<span style="color:#3b82f6;">' + escHtml(name2) + ' · ' + s2 + '%</span>' : '') +
                    '</div>' +
                '</div>' +

                // Monats-Override für Split
                '<div style="border-top:1px solid var(--border);padding-top:14px;">' +
                    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">' +
                        '<div style="font-size:0.72rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;">Überschreibung für ' + new Date(monat+'-01').toLocaleDateString('de-DE',{month:'long',year:'numeric'}) + '</div>' +
                        (splitOverride ? '<span style="font-size:0.72rem;background:rgba(16,185,129,0.12);color:var(--haus-accent);padding:2px 8px;border-radius:6px;font-weight:700;">Aktiv</span>' : '<span style="font-size:0.72rem;color:var(--text-3);">Standard wird verwendet</span>') +
                    '</div>' +
                    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">' +
                        '<span style="font-size:0.82rem;color:#10b981;min-width:28px;text-align:right;" id="splitOvVal">' + s1 + '%</span>' +
                        '<input type="range" id="splitOvSlider" min="0" max="100" value="' + s1 + '" style="flex:1;accent-color:var(--haus-accent);" oninput="document.getElementById(\'splitOvVal\').textContent=this.value+\'%\'">' +
                        '<span style="font-size:0.82rem;color:#3b82f6;min-width:28px;">' + s2 + '%</span>' +
                    '</div>' +
                    '<div style="display:flex;gap:8px;margin-top:10px;">' +
                        '<button onclick="saveSplitOverride(\'' + monat + '\')" style="padding:7px 14px;border-radius:var(--radius-md);background:rgba(16,185,129,0.1);color:#10b981;border:1px solid rgba(16,185,129,0.25);cursor:pointer;font-size:0.82rem;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:600;">Speichern</button>' +
                        (splitOverride ? '<button onclick="deleteSplitOverride(\'' + monat + '\')" style="padding:7px 14px;border-radius:var(--radius-md);background:rgba(239,68,68,0.08);color:#ef4444;border:1px solid rgba(239,68,68,0.2);cursor:pointer;font-size:0.82rem;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:600;">Zurücksetzen</button>' : '') +
                    '</div>' +
                '</div>' +
            '</div>' +

            // 2. Kostenliste
            '<div class="card" style="padding:20px;">' +
                '<div class="card-header">' +
                    '<h3>Monatliche Kosten</h3>' +
                    '<button onclick="openFixkostModal()" class="btn-primary" style="font-size:0.82rem;padding:7px 14px;"><i class="ri-add-line"></i> Kosten hinzufügen</button>' +
                '</div>';

        if (fixkRes.length === 0) {
            html += '<div style="text-align:center;padding:32px;color:var(--text-3);">' +
                '<i class="ri-bill-line" style="font-size:2rem;display:block;margin-bottom:10px;"></i>' +
                '<div style="font-weight:600;margin-bottom:6px;">Noch keine Kosten eingetragen</div>' +
                '<div style="font-size:0.84rem;margin-bottom:16px;">Füge Miete, Strom, Internet und andere gemeinsame Kosten hinzu.</div>' +
                '<button onclick="openFixkostModal()" class="btn-primary"><i class="ri-add-line"></i> Erste Kosten eintragen</button>' +
            '</div>';
        } else {
            const byKat = {};
            fixkRes.forEach(f => { if (!byKat[f.kategorie]) byKat[f.kategorie] = []; byKat[f.kategorie].push(f); });
            const katOrder = ['wohnen','lebensmittel','versicherung','transport','freizeit','sonstiges'];
            const sortedKats = [...katOrder.filter(k => byKat[k]), ...Object.keys(byKat).filter(k => !katOrder.includes(k))];

            sortedKats.forEach(kat => {
                const items = byKat[kat];
                if (!items) return;
                html += '<div style="margin-bottom:18px;">' +
                    '<div style="font-size:0.72rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);">' + (katLabels[kat] || kat) + '</div>';

                items.forEach(f => {
                    const ov = overrideRes.find(o => o.fixkosten_id == f.id);
                    const effBetrag = ov?.betrag ?? f.betrag;
                    const monatl   = monatlichBetrag(f, effBetrag);
                    const hasOv    = !!ov;
                    const istJaehrl = ['jaehrlich','halbjaehrlich','vierteljaehrlich'].includes(f.rhythmus);

                    html += '<div class="aus-row">' +
                        '<div style="flex:1;min-width:0;">' +
                            '<div style="font-weight:600;font-size:0.88rem;">' + escHtml(f.name) +
                                (hasOv ? ' <span style="font-size:0.7rem;color:var(--haus-accent);background:rgba(16,185,129,0.1);padding:1px 6px;border-radius:6px;">Monat-Override</span>' : '') +
                            '</div>' +
                            '<div style="font-size:0.74rem;color:var(--text-3);">' +
                                fmt.format(effBetrag) + ' · ' + f.rhythmus +
                                (istJaehrl ? ' · <span style="color:var(--haus-accent);">' + fmt.format(monatl) + '/Monat</span>' : '') +
                            '</div>' +
                        '</div>' +
                        '<div style="text-align:right;margin-right:12px;">' +
                            '<div style="font-weight:700;font-size:0.9rem;">' + fmt.format(monatl) + '</div>' +
                            '<div style="font-size:0.75rem;color:var(--text-3);">/Monat</div>' +
                        '</div>' +
                        '<div style="display:flex;gap:5px;">' +
                            '<button onclick="buchFixkost(' + f.id + ',\'' + escHtml(f.name) + '\')" title="Als Transaktion buchen" style="padding:0 9px;height:28px;border-radius:7px;background:rgba(16,185,129,0.1);color:#10b981;border:1px solid rgba(16,185,129,0.2);cursor:pointer;font-size:0.74rem;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:600;white-space:nowrap;">' +
                                '<i class="ri-cash-line"></i> Buchen' +
                            '</button>' +
                            '<button onclick="openFixkostOverride(' + f.id + ',\'' + escHtml(f.name) + '\',' + effBetrag + ')" title="Betrag für diesen Monat anpassen" style="width:28px;height:28px;border-radius:7px;background:var(--surface-2);color:var(--text-2);border:none;cursor:pointer;" title="Monat-Override"><i class="ri-calendar-event-line"></i></button>' +
                            (hasOv ? '<button onclick="removeOverride(' + f.id + ')" style="width:28px;height:28px;border-radius:7px;background:rgba(245,158,11,0.1);color:#f59e0b;border:none;cursor:pointer;"><i class="ri-arrow-go-back-line"></i></button>' : '') +
                            '<button onclick="openFixkostModal(' + f.id + ')" style="width:28px;height:28px;border-radius:7px;background:var(--surface-2);color:var(--text-2);border:none;cursor:pointer;"><i class="ri-edit-line"></i></button>' +
                            '<button onclick="deleteFixkost(' + f.id + ')" style="width:28px;height:28px;border-radius:7px;background:rgba(239,68,68,0.1);color:#ef4444;border:none;cursor:pointer;"><i class="ri-delete-bin-line"></i></button>' +
                        '</div>' +
                    '</div>';
                });
                html += '</div>';
            });

            // Gesamtzeile
            html += '<div style="border-top:2px solid var(--border);padding-top:12px;display:flex;justify-content:space-between;align-items:center;">' +
                '<span style="font-weight:700;">Gesamt monatlich</span>' +
                '<span style="font-weight:800;font-size:1.05rem;">' + fmt.format(gesamtMonatlich) + '</span>' +
            '</div>';
        }
        html += '</div>';
        root.innerHTML = html;
        window._fixkRes = fixkRes;
    }

    function kpiBox(label, value, color) {
        return '<div style="text-align:center;background:var(--surface-2);border-radius:var(--radius-md);padding:14px 10px;">' +
            '<div style="font-size:0.71rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">' + label + '</div>' +
            '<div style="font-size:1.1rem;font-weight:800;color:' + color + ';">' + value + '</div>' +
        '</div>';
    }

    function kpiBoxColor(label, value, sub, color) {
        return '<div style="text-align:center;background:' + color + '12;border:1px solid ' + color + '30;border-radius:var(--radius-md);padding:14px 10px;">' +
            '<div style="font-size:0.71rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">' + escHtml(label) + '</div>' +
            '<div style="font-size:1.1rem;font-weight:800;color:' + color + ';">' + value + '</div>' +
            '<div style="font-size:0.73rem;color:' + color + ';margin-top:2px;opacity:0.8;">' + sub + '</div>' +
        '</div>';
    }

    // Split-Einstellungen Modal
    function openSplitSettings() {
        const name1 = user1.anzeigename || 'Person 1';
        const name2 = user2 ? (user2.anzeigename || 'Person 2') : 'Person 2';
        const s1 = globalSettings.split_user1;
        createModal('Kostenaufteilung festlegen',
            '<p style="font-size:0.84rem;color:var(--text-3);margin-bottom:18px;">Wie viel Prozent der gemeinsamen Haushaltskosten übernimmt jede Person? Das gilt für alle Fixkosten zusammen.</p>' +
            '<div style="background:var(--surface-2);border-radius:var(--radius-md);padding:16px;margin-bottom:16px;">' +
                '<div style="display:flex;justify-content:space-between;margin-bottom:10px;font-weight:600;font-size:0.88rem;">' +
                    '<span style="color:#10b981;">' + escHtml(name1) + ': <span id="splitVal1">' + s1 + '</span>%</span>' +
                    '<span style="color:#3b82f6;">' + escHtml(name2) + ': <span id="splitVal2">' + (100-s1) + '</span>%</span>' +
                '</div>' +
                '<input type="range" id="splitSlider" min="0" max="100" value="' + s1 + '" ' +
                    'oninput="document.getElementById(\'splitVal1\').textContent=this.value; document.getElementById(\'splitVal2\').textContent=100-this.value; updateSplitBarPreview(this.value);" ' +
                    'style="width:100%;accent-color:var(--haus-accent);">' +
                '<div style="display:flex;border-radius:6px;overflow:hidden;height:10px;margin-top:10px;" id="splitBarPreview">' +
                    '<div id="splitBar1" style="width:' + s1 + '%;background:#10b981;transition:width 0.1s;"></div>' +
                    '<div id="splitBar2" style="width:' + (100-s1) + '%;background:#3b82f6;transition:width 0.1s;"></div>' +
                '</div>' +
            '</div>' +
            '<p style="font-size:0.78rem;color:var(--text-3);">Tipp: 50/50 ist fair wenn beide gleich viel verdienen. Bei unterschiedlichem Einkommen kannst du auch nach Gehalt-Verhältnis aufteilen.</p>',
            async () => {
                const val = parseInt(document.getElementById('splitSlider').value);
                const res = await fetch('/users/haushalt/settings', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ split_user1: val, split_user2: 100 - val })
                });
                if (!res.ok) return false;
                globalSettings.split_user1 = val;
                globalSettings.split_user2 = 100 - val;
                return true;
            },
            () => loadTab('fixkosten')
        );
    }

    function updateSplitBarPreview(val) {
        const b1 = document.getElementById('splitBar1');
        const b2 = document.getElementById('splitBar2');
        if (b1) b1.style.width = val + '%';
        if (b2) b2.style.width = (100 - val) + '%';
    }

    async function saveSplitOverride(monat) {
        const val = parseInt(document.getElementById('splitOvSlider').value);
        await fetch('/users/haushalt/split/monat/' + monat, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ split_user1: val })
        });
        loadTab('fixkosten');
    }

    async function deleteSplitOverride(monat) {
        await fetch('/users/haushalt/split/monat/' + monat, { method: 'DELETE' });
        loadTab('fixkosten');
    }

    async function openFixkostModal(id) {
        const existing = id ? (window._fixkRes || []).find(f => f.id == id) : null;
        const katOptions = ['wohnen','lebensmittel','transport','freizeit','versicherung','sonstiges'];
        const katLabels2 = { wohnen:'Wohnen (Miete, NK)', lebensmittel:'Lebensmittel & Haushalt', transport:'Transport', freizeit:'Freizeit', versicherung:'Versicherung', sonstiges:'Sonstiges' };
        createModal((existing ? 'Kosten bearbeiten' : 'Kosten hinzufügen'),
            '<div class="form-group" style="margin-bottom:12px;">' +
                '<label class="form-label">Bezeichnung</label>' +
                '<input type="text" id="mfName" value="' + escHtml(existing?.name || '') + '" placeholder="z.B. Miete, Strom, GEZ…">' +
            '</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;">' +
                '<div class="form-group">' +
                    '<label class="form-label">Betrag</label>' +
                    '<input type="number" id="mfBetrag" value="' + (existing?.betrag || '') + '" step="0.01" placeholder="0,00">' +
                '</div>' +
                '<div class="form-group">' +
                    '<label class="form-label">Rhythmus</label>' +
                    '<select id="mfRhythmus">' +
                        ['monatlich','vierteljaehrlich','halbjaehrlich','jaehrlich'].map(r =>
                            '<option value="' + r + '"' + (existing?.rhythmus === r ? ' selected' : '') + '>' + r + '</option>'
                        ).join('') +
                    '</select>' +
                '</div>' +
                '<div class="form-group">' +
                    '<label class="form-label">Fällig am Tag</label>' +
                    '<input type="number" id="mfDatumTag" min="1" max="31" value="' + (existing?.datum_tag || 1) + '" placeholder="1–31">' +
                '</div>' +
            '</div>' +
            '<div class="form-group">' +
                '<label class="form-label">Kategorie</label>' +
                '<select id="mfKat">' +
                    katOptions.map(k => '<option value="' + k + '"' + (existing?.kategorie === k ? ' selected' : '') + '>' + (katLabels2[k]||k) + '</option>').join('') +
                '</select>' +
            '</div>',
            async () => {
                const payload = {
                    name:      document.getElementById('mfName').value.trim(),
                    betrag:    parseFloat(document.getElementById('mfBetrag').value) || 0,
                    rhythmus:  document.getElementById('mfRhythmus').value,
                    datum_tag: parseInt(document.getElementById('mfDatumTag').value) || 1,
                    kategorie: document.getElementById('mfKat').value,
                    anteil_user1: globalSettings.split_user1,
                    anteil_user2: globalSettings.split_user2,
                };
                if (!payload.name) { alert('Bitte Bezeichnung eingeben.'); return false; }
                const url    = id ? '/users/haushalt/fixkosten/' + id : '/users/haushalt/fixkosten/add';
                const method = id ? 'PUT' : 'POST';
                const res    = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                if (!res.ok) { alert('Fehler beim Speichern.'); return false; }
                return true;
            },
            () => loadTab('fixkosten')
        );
    }

    // ── Tab: Budget ───────────────────────────────────────────────
    async function loadBudget(root) {
        const monat = picker.value;
        const monatLabel = new Date(monat + '-01').toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
        const [budgetRes, ausgRes] = await Promise.all([
            fetch('/users/haushalt/budgets').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/transaktionen').then(r=>r.json()).catch(()=>[]),
        ]);

        // Ausgaben diesen Monat nach Kategorie
        const monatsAusg = ausgRes.filter(a => a.type === 'Ausgaben' && (a.date||'').startsWith(monat) && !a.ausgabe_id);
        const byKat = {};
        monatsAusg.forEach(a => {
            const k = a.category || 'Sonstiges';
            byKat[k] = (byKat[k]||0) + (a.amount||0);
        });

        // Alle Kategorien: aus Budgets + aus echten Ausgaben (für die kein Budget existiert)
        const budgetKats = new Set(budgetRes.map(b => b.kategorie));
        const ausgabenKats = Object.keys(byKat).filter(k => !budgetKats.has(k));

        // Budget-Zeilen
        const budgetItems = budgetRes.map(b => ({
            id: b.id, kategorie: b.kategorie, budget: b.betrag,
            ausgegeben: byKat[b.kategorie] || 0
        }));
        budgetItems.sort((a,b) => (b.ausgegeben/b.budget) - (a.ausgegeben/a.budget));

        let html = '<div class="card" style="padding:20px;margin-bottom:16px;">' +
            '<div class="card-header"><h3>Budgets für ' + monatLabel + '</h3>' +
                '<button onclick="openBudgetModal()" class="btn-primary" style="font-size:0.82rem;padding:7px 14px;"><i class="ri-add-line"></i> Budget setzen</button>' +
            '</div>' +
            '<p style="font-size:0.83rem;color:var(--text-3);margin-bottom:20px;">Legt Obergrenzen pro Ausgaben-Kategorie fest. Die Fortschrittsbalken zeigen was ihr diesen Monat bereits ausgegeben habt.</p>';

        if (budgetItems.length === 0) {
            html += '<div style="text-align:center;padding:32px;color:var(--text-3);">' +
                '<i class="ri-pie-chart-2-line" style="font-size:2.5rem;display:block;margin-bottom:12px;color:var(--haus-accent);"></i>' +
                '<div style="font-weight:600;margin-bottom:6px;">Noch keine Budgets festgelegt</div>' +
                '<div style="font-size:0.84rem;margin-bottom:16px;">Legt Obergrenzen fest, damit ihr den Überblick behaltet.</div>' +
                '<button onclick="openBudgetModal()" class="btn-primary"><i class="ri-add-line"></i> Erstes Budget anlegen</button>' +
            '</div>';
        } else {
            html += budgetItems.map(b => {
                const pct = b.budget > 0 ? Math.min(100, b.ausgegeben / b.budget * 100) : 0;
                const uebrig = b.budget - b.ausgegeben;
                const barColor = pct > 100 ? '#ef4444' : pct > 80 ? '#f59e0b' : '#10b981';
                return '<div style="margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border);">' +
                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
                        '<div style="display:flex;align-items:center;gap:8px;">' +
                            '<span style="font-weight:700;font-size:0.9rem;">' + escHtml(b.kategorie) + '</span>' +
                            (pct > 100 ? '<span style="font-size:0.72rem;background:rgba(239,68,68,0.12);color:#ef4444;padding:2px 7px;border-radius:6px;">Überschritten</span>' :
                             pct > 80  ? '<span style="font-size:0.72rem;background:rgba(245,158,11,0.12);color:#f59e0b;padding:2px 7px;border-radius:6px;">Achtung</span>' : '') +
                        '</div>' +
                        '<div style="display:flex;gap:8px;align-items:center;">' +
                            '<span style="font-size:0.84rem;color:var(--text-3);">' + fmt.format(b.ausgegeben) + ' / ' + fmt.format(b.budget) + '</span>' +
                            '<button onclick="openBudgetModal(' + b.id + ',\'' + escHtml(b.kategorie) + '\',' + b.budget + ')" style="width:28px;height:28px;border-radius:8px;background:var(--surface-2);color:var(--text-2);border:none;cursor:pointer;"><i class="ri-edit-line"></i></button>' +
                            '<button onclick="deleteBudget(' + b.id + ')" style="width:28px;height:28px;border-radius:8px;background:rgba(239,68,68,0.1);color:#ef4444;border:none;cursor:pointer;"><i class="ri-delete-bin-line"></i></button>' +
                        '</div>' +
                    '</div>' +
                    '<div style="background:var(--surface-2);border-radius:6px;height:10px;overflow:hidden;margin-bottom:4px;">' +
                        '<div style="height:100%;width:' + Math.min(100,pct) + '%;background:' + barColor + ';border-radius:6px;transition:width 0.4s;"></div>' +
                    '</div>' +
                    '<div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-3);">' +
                        '<span>' + pct.toFixed(0) + '% verbraucht</span>' +
                        '<span style="color:' + (uebrig<0?'#ef4444':'var(--text-3)') + ';">' + (uebrig>=0 ? fmt.format(uebrig) + ' übrig' : fmt.format(-uebrig) + ' überschritten') + '</span>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        // Kategorien ohne Budget (Ausgaben vorhanden)
        if (ausgabenKats.length > 0) {
            html += '<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:16px;">' +
                '<div style="font-size:0.72rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Ausgaben ohne Budget</div>';
            ausgabenKats.forEach(k => {
                html += '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:0.84rem;border-bottom:1px solid var(--border);">' +
                    '<span>' + escHtml(k) + '</span>' +
                    '<div style="display:flex;align-items:center;gap:8px;">' +
                        '<span style="color:var(--text-2);">' + fmt.format(byKat[k]) + '</span>' +
                        '<button onclick="openBudgetModal(null,\'' + escHtml(k) + '\')" style="padding:3px 8px;border-radius:6px;background:rgba(16,185,129,0.1);color:#10b981;border:none;cursor:pointer;font-size:0.75rem;font-family:\'Plus Jakarta Sans\',sans-serif;">Budget setzen</button>' +
                    '</div>' +
                '</div>';
            });
            html += '</div>';
        }

        html += '</div>';
        root.innerHTML = html;
        window._budgetRes = budgetRes;
    }

    async function openBudgetModal(id, prefillKat, prefillBetrag) {
        createModal('Budget ' + (id ? 'bearbeiten' : 'setzen'),

                '<label class="form-label">Kategorie</label>' +
                '<input type="text" id="bdKat" value="' + escHtml(prefillKat||'') + '" placeholder="z.B. Lebensmittel" list="katSuggestions">' +
                '<datalist id="katSuggestions"><option value="Lebensmittel"><option value="Wohnen"><option value="Transport"><option value="Freizeit"><option value="Restaurants"><option value="Kleidung"><option value="Gesundheit"><option value="Urlaub"><option value="Sonstiges"></datalist>' +
            '</div>' +
            '<div class="form-group">' +
                '<label class="form-label">Budget pro Monat (€)</label>' +
                '<input type="number" id="bdBetrag" value="' + (prefillBetrag||'') + '" step="0.01" placeholder="z.B. 400">' +

    async function deleteBudget(id) {
        if (!confirm('Budget löschen?')) return;
        await fetch('/users/haushalt/budgets/' + id, { method: 'DELETE' });
        loadTab('budget');
    }

    // ── Tab: Sparziele ────────────────────────────────────────────
    async function loadSparziele(root) {
        const [sparzRes, kontenRes] = await Promise.all([
            fetch('/users/haushalt/sparziele').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/konto/data').then(r=>r.json()).catch(()=>({ konten:[] })),
        ]);
        const konten = kontenRes.konten || [];
        const totalAngespart  = sparzRes.reduce((s,z) => s + (z.aktuell||0), 0);
        const totalZiel        = sparzRes.reduce((s,z) => s + (z.zielbetrag||0), 0);

        let html = '<div class="card" style="padding:20px;margin-bottom:16px;">' +
            '<div class="card-header"><h3>Sparziele</h3>' +
                '<button onclick="openSparzielModal()" class="btn-primary" style="font-size:0.82rem;padding:7px 14px;"><i class="ri-add-line"></i> Neues Ziel</button>' +
            '</div>' +
            '<p style="font-size:0.83rem;color:var(--text-3);margin-bottom:' + (sparzRes.length>0?'16':'0') + 'px;">Legt gemeinsame Sparziele fest — für Urlaub, neue Küche, Altersvorsorge oder was auch immer euch wichtig ist.</p>';

        if (sparzRes.length > 0) {
            html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);">' +
                '<div style="text-align:center;">' +
                    '<div style="font-size:0.72rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;">Angespart</div>' +
                    '<div style="font-size:1.2rem;font-weight:800;color:#10b981;">' + fmt.format(totalAngespart) + '</div>' +
                '</div>' +
                '<div style="text-align:center;">' +
                    '<div style="font-size:0.72rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;">Gesamt-Ziel</div>' +
                    '<div style="font-size:1.2rem;font-weight:800;">' + fmt.format(totalZiel) + '</div>' +
                '</div>' +
                '<div style="text-align:center;">' +
                    '<div style="font-size:0.72rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;">Noch nötig</div>' +
                    '<div style="font-size:1.2rem;font-weight:800;color:#f59e0b;">' + fmt.format(Math.max(0, totalZiel - totalAngespart)) + '</div>' +
                '</div>' +
            '</div>';
        }

        if (sparzRes.length === 0) {
            html += '<div style="text-align:center;padding:32px;color:var(--text-3);">' +
                '<i class="ri-trophy-line" style="font-size:2.5rem;display:block;margin-bottom:12px;color:#f59e0b;"></i>' +
                '<div style="font-weight:600;margin-bottom:6px;">Noch keine Sparziele</div>' +
                '<div style="font-size:0.84rem;margin-bottom:16px;">Für was spart ihr als nächstes?</div>' +
                '<button onclick="openSparzielModal()" class="btn-primary"><i class="ri-add-line"></i> Erstes Ziel anlegen</button>' +
            '</div>';
        } else {
            html += sparzRes.map(z => renderSparzielRow(z, konten)).join('');
        }

        html += '</div>';
        root.innerHTML = html;
        window._sparzRes = sparzRes;
        window._kontenRes = konten;
    }

    function renderSparzielRow(z, konten) {
        const pct = z.zielbetrag > 0 ? Math.min(100, z.aktuell / z.zielbetrag * 100) : 0;
        const fehlt = Math.max(0, z.zielbetrag - z.aktuell);
        const heute = new Date();
        let daysLeft = null, daysLabel = '';
        if (z.faellig_datum) {
            daysLeft = Math.ceil((new Date(z.faellig_datum) - heute) / 86400000);
            daysLabel = daysLeft > 0 ? 'Noch ' + daysLeft + ' Tage' : 'Zieldatum überschritten';
        }
        const barColor = pct >= 100 ? '#10b981' : (z.farbe || '#10b981');

        return '<div style="padding:18px;margin-bottom:12px;background:var(--surface-2);border-radius:var(--radius-md);border:1px solid var(--border);">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
                '<div style="display:flex;align-items:center;gap:10px;">' +
                    '<div style="width:38px;height:38px;border-radius:10px;background:' + (z.farbe||'#10b981') + '20;border:2px solid ' + (z.farbe||'#10b981') + '40;display:flex;align-items:center;justify-content:center;font-size:1rem;color:' + (z.farbe||'#10b981') + ';"><i class="ri-trophy-line"></i></div>' +
                    '<div>' +
                        '<div style="font-weight:700;font-size:0.95rem;">' + escHtml(z.name) + '</div>' +
                        (z.notiz ? '<div style="font-size:0.75rem;color:var(--text-3);">' + escHtml(z.notiz) + '</div>' : '') +
                    '</div>' +
                '</div>' +
                '<div style="display:flex;gap:6px;">' +
                    '<button onclick="openEinzahlenModal(' + z.id + ',\'' + escHtml(z.name) + '\')" style="padding:5px 12px;border-radius:8px;background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.25);cursor:pointer;font-size:0.78rem;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:600;"><i class="ri-add-line"></i> Einzahlen</button>' +
                    '<button onclick="openSparzielModal(' + z.id + ')" style="width:30px;height:30px;border-radius:8px;background:var(--surface);color:var(--text-2);border:1px solid var(--border);cursor:pointer;"><i class="ri-edit-line"></i></button>' +
                    '<button onclick="deleteSparziel(' + z.id + ')" style="width:30px;height:30px;border-radius:8px;background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);cursor:pointer;"><i class="ri-delete-bin-line"></i></button>' +
                '</div>' +
            '</div>' +
            '<div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:6px;">' +
                '<span style="color:var(--text-3);">' + fmt.format(z.aktuell) + ' angespart</span>' +
                '<span style="font-weight:700;">' + fmt.format(z.zielbetrag) + ' Ziel</span>' +
            '</div>' +
            '<div style="background:var(--surface);border-radius:6px;height:10px;overflow:hidden;margin-bottom:6px;">' +
                '<div style="height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:6px;transition:width 0.4s;"></div>' +
            '</div>' +
            '<div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-3);">' +
                '<span>' + pct.toFixed(0) + '% erreicht' + (fehlt > 0 ? ' · noch ' + fmt.format(fehlt) + ' bis zum Ziel' : ' · Ziel erreicht 🎉') + '</span>' +
                (z.faellig_datum ? '<span style="color:' + (daysLeft !== null && daysLeft < 30 ? '#f59e0b' : 'var(--text-3)') + ';">' + daysLabel + ' (' + new Date(z.faellig_datum).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'}) + ')</span>' : '') +
            '</div>' +
            (fehlt > 0 && daysLeft !== null && daysLeft > 0 ? (function() {
                const monateBisZiel = Math.max(1, Math.ceil(daysLeft / 30));
                const monatsrate = fehlt / monateBisZiel;
                return '<div style="margin-top:6px;padding:6px 10px;background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.15);border-radius:var(--radius-md);font-size:0.76rem;color:#047857;display:flex;align-items:center;gap:6px;">' +
                    '<i class="ri-arrow-right-circle-line"></i>' +
                    '<strong>' + fmt.format(monatsrate) + '/Monat</strong> nötig um das Ziel rechtzeitig zu erreichen' +
                '</div>';
            })() : '') +
        '</div>';
    }

    async function openSparzielModal(id) {

        createModal('Sparziel ' + (existing ? 'bearbeiten' : 'anlegen'),
            '<div class="form-group" style="margin-bottom:12px;">' +
                '<label class="form-label">Name</label>' +
                '<input type="text" id="szName" value="' + escHtml(existing?.name||'') + '" placeholder="z.B. Sommerurlaub 2025">' +

                '<div class="form-group">' +
                    '<label class="form-label">Zielbetrag (€)</label>' +
                    '<input type="number" id="szZiel" value="' + (existing?.zielbetrag||'') + '" step="0.01" placeholder="z.B. 2000">' +
                '</div>' +
                '<div class="form-group">' +
                    '<label class="form-label">Bereits angespart (€)</label>' +
                    '<input type="number" id="szAktuell" value="' + (existing?.aktuell||'') + '" step="0.01" placeholder="0">' +
                '</div>' +
            '</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">' +
                '<div class="form-group">' +
                    '<label class="form-label">Zieldatum (optional)</label>' +
                    '<input type="date" id="szDatum" value="' + (existing?.faellig_datum||'') + '">' +
                '</div>' +
                '<div class="form-group">' +
                    '<label class="form-label">Farbe</label>' +
                    '<input type="color" id="szFarbe" value="' + (existing?.farbe||'#10b981') + '" style="width:100%;height:38px;border-radius:var(--radius-md);border:1px solid var(--border);padding:3px;background:var(--surface-2);">' +
                '</div>' +
            '</div>' +
            '<div class="form-group">' +

    // ── Tab: Monatsübersicht ──────────────────────────────────────
    async function loadUebersicht(root) {
        const monat = picker.value;
        const monatLabel = new Date(monat + '-01').toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
        const [fixkRes, overrideRes, persRes, gehRes, ausgRes, budgetRes, sparzRes, splitOverride] = await Promise.all([
            fetch('/users/haushalt/fixkosten').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/fixkosten/monat/' + monat).then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/persoenlich').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/gehaelter?monat=' + monat).then(r=>r.json()).catch(()=>({defaults:[],monat:[]})),
            fetch('/users/haushalt/transaktionen').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/budgets').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/sparziele').then(r=>r.json()).catch(()=>[]),
            fetch('/users/haushalt/split/monat/' + monat).then(r=>r.json()).catch(()=>null),
        ]);

        function getGeh(userId) {
            const m = gehRes.monat.find(g=>g.user_id===userId);
            return m || gehRes.defaults.find(g=>g.user_id===userId) || { gehalt:0, sparbetrag:0 };
        }

        const monatsAusg = ausgRes.filter(a => a.type==='Ausgaben'  && (a.date||'').startsWith(monat) && !a.ausgabe_id);
        const monatsEinn = ausgRes.filter(a => a.type==='Einnahmen' && (a.date||'').startsWith(monat));

        const totalFix  = fixkRes.reduce((s,f) => { const ov=overrideRes.find(o=>o.fixkosten_id==f.id); return s+(ov?.betrag??f.betrag); }, 0);
        const totalAusg = monatsAusg.reduce((s,a)=>s+(a.amount||0),0);
        const totalEinn = monatsEinn.reduce((s,a)=>s+(a.amount||0),0);
        const totalGeh  = [user1,user2].filter(Boolean).reduce((s,u)=>s+(getGeh(u.user_id).gehalt||0),0);
        const totalSpar = [user1,user2].filter(Boolean).reduce((s,u)=>s+(getGeh(u.user_id).sparbetrag||0),0);
        const saldo     = totalEinn - totalAusg;

        // Ausgaben nach Kategorie
        const byKat = {};
        monatsAusg.forEach(a => { const k=a.category||'Sonstiges'; byKat[k]=(byKat[k]||0)+(a.amount||0); });

        const s1 = splitOverride?.split_user1 ?? globalSettings.split_user1;
        const s2 = 100 - s1;

        const renderPerson = (u, color) => {
            if (!u) return '';
            const name   = u.anzeigename || 'Person';
            const geh    = getGeh(u.user_id);
            const splitP = u.user_id === user1.user_id ? s1 : s2;
            const pers   = persRes.filter(p=>p.user_id===u.user_id).reduce((s,p)=>s+p.betrag,0);
            const gemein = fixkRes.reduce((s,f) => {
                const ov = overrideRes.find(o=>o.fixkosten_id==f.id);
                const b  = ov?.betrag ?? f.betrag;
                return s + b * splitP / 100;
            }, 0);
            const geplanteKosten = gemein + pers + (geh.sparbetrag||0);
            const istKosten      = gemein + pers + (geh.sparbetrag||0);
            const frei           = geh.gehalt - istKosten;
            const auslastung     = geh.gehalt > 0 ? Math.min(100, istKosten/geh.gehalt*100) : 0;

            return '<div class="ueber-person" style="border-left:3px solid ' + color + ';">' +
                '<div style="font-size:1rem;font-weight:800;color:' + color + ';margin-bottom:14px;">' + escHtml(name) + '</div>' +
                // Plan
                '<div style="font-size:0.72rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Plan</div>' +
                '<div class="ueber-row"><span style="color:var(--text-3);">Gehalt</span><span style="color:#22c55e;font-weight:600;">' + fmt.format(geh.gehalt||0) + '</span></div>' +
                '<div class="ueber-row"><span style="color:var(--text-3);">Fixkosten-Anteil</span><span style="color:#ef4444;">−' + fmt.format(gemein) + '</span></div>' +
                '<div class="ueber-row"><span style="color:var(--text-3);">Pers. Fixkosten</span><span style="color:#ef4444;">−' + fmt.format(pers) + '</span></div>' +
                '<div class="ueber-row"><span style="color:var(--text-3);">Sparen (geplant)</span><span style="color:#3b82f6;">−' + fmt.format(geh.sparbetrag||0) + '</span></div>' +
                '<div class="ueber-row" style="border-bottom:none;padding-bottom:2px;"><span style="color:var(--text-3);">Plan-Frei</span><span style="font-weight:700;">' + fmt.format(geh.gehalt - geplanteKosten) + '</span></div>' +
                '<div class="ueber-total" style="border-color:' + color + '40;margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">' +
                    '<span>Tatsächlich frei</span>' +
                    '<span style="color:' + (frei>=0?'#22c55e':'#ef4444') + ';">' + fmt.format(frei) + '</span>' +
                '</div>' +
                '<div style="margin-top:10px;">' +
                    '<div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-3);margin-bottom:4px;"><span>Kostenauslastung</span><span>' + auslastung.toFixed(0) + '%</span></div>' +
                    '<div style="background:var(--surface-2);border-radius:5px;height:8px;overflow:hidden;"><div style="height:100%;width:' + auslastung + '%;background:' + (auslastung>90?'#ef4444':auslastung>75?'#f59e0b':color) + ';border-radius:5px;transition:width 0.4s;"></div></div>' +
                '</div>' +
            '</div>';
        };

        // Kategorie-Auswertung
        const sortedKats = Object.entries(byKat).sort((a,b) => b[1]-a[1]);
        const budgetMap  = {};
        budgetRes.forEach(b => budgetMap[b.kategorie] = b.betrag);

        root.innerHTML =
            '<div class="card" style="padding:20px;margin-bottom:16px;">' +
                '<h3 style="margin:0 0 16px;">Monatsbilanz: ' + monatLabel + '</h3>' +
                // Gesamt-Kennzahlen
                '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);">' +
                    kpiBox('Gesamtgehalt', fmt.format(totalGeh), '#22c55e') +
                    kpiBox('Gemeins. Fixkosten', fmt.format(totalFix), '#ef4444') +
                    kpiBox('Ist-Ausgaben gesamt', fmt.format(totalAusg), '#f59e0b') +
                    kpiBox('Monatssaldo', (saldo>=0?'+':'')+fmt.format(saldo), saldo>=0?'#22c55e':'#ef4444') +
                '</div>' +
                // Personen-Karten
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">' +
                    renderPerson(user1, '#10b981') +
                    (user2 ? renderPerson(user2, '#3b82f6') : '<div style="display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:0.85rem;padding:20px;border:1px dashed var(--border);border-radius:var(--radius-md);">Noch kein zweites Mitglied</div>') +
                '</div>' +
                // Ausgaben nach Kategorie
                (sortedKats.length > 0 ?
                    '<div style="border-top:1px solid var(--border);padding-top:16px;">' +
                        '<div style="font-size:0.72rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;">Ausgaben nach Kategorie</div>' +
                        sortedKats.map(([k, betrag]) => {
                            const budget = budgetMap[k];
                            const pct    = budget ? Math.min(100, betrag/budget*100) : null;
                            return '<div style="margin-bottom:10px;">' +
                                '<div style="display:flex;justify-content:space-between;font-size:0.83rem;margin-bottom:4px;">' +
                                    '<span style="font-weight:600;">' + escHtml(k) + '</span>' +
                                    '<span style="color:var(--text-2);">' + fmt.format(betrag) + (budget ? ' / ' + fmt.format(budget) : '') + '</span>' +
                                '</div>' +
                                (budget ? '<div style="background:var(--surface-2);border-radius:5px;height:7px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:' + (pct>100?'#ef4444':pct>80?'#f59e0b':'#10b981') + ';border-radius:5px;"></div></div>' : '') +
                            '</div>';
                        }).join('') +
                    '</div>' : '') +
            '</div>';
    }

    // ── Modal-Helper ──────────────────────────────────────────────
    function createModal(title, bodyHtml, onSave, onClose) {
        const existing = document.getElementById('hausModal');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.id = 'hausModal';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';

        overlay.innerHTML =
            '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;">' +
                '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
                    '<h3 style="margin:0;">' + title + '</h3>' +
                    '<button id="hausModalClose" style="width:32px;height:32px;border-radius:8px;background:var(--surface-2);border:none;color:var(--text-2);cursor:pointer;font-size:1rem;"><i class="ri-close-line"></i></button>' +
                '</div>' +
                '<div id="hausModalBody">' + bodyHtml + '</div>' +
                '<div style="display:flex;gap:8px;margin-top:20px;">' +
                    '<button id="hausModalSave" class="btn-primary" style="flex:1;justify-content:center;"><i class="ri-save-line"></i> Speichern</button>' +
                    '<button id="hausModalCancel" style="padding:10px 20px;border-radius:var(--radius-md);background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);cursor:pointer;font-family:\'Plus Jakarta Sans\',sans-serif;">Abbrechen</button>' +
                '</div>' +
            '</div>';

        document.body.appendChild(overlay);

        const close = () => { overlay.remove(); if (onClose) onClose(); };
        document.getElementById('hausModalClose').onclick = () => overlay.remove();
        document.getElementById('hausModalCancel').onclick = () => overlay.remove();
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        document.getElementById('hausModalSave').onclick = async () => {
            const ok = await onSave();
            if (ok !== false) close();
        };

        return overlay;
    }

    function escHtml(str) {
        return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
    </script>
    <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
